<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="data:image/x-icon;base64,">
	<title>Notes</title>
	<style>
:root {
	/* Light theme colors */
	--bg-primary: #ffffff;
	--bg-secondary: #f6f8fa;
	--bg-tertiary: #ffffff;
	--text-primary: #24292e;
	--text-secondary: #666;
	--text-muted: #999;
	--border-color: #ddd;
	--border-light: #eee;
	--shadow-color: rgba(0, 0, 0, 0.1);
	--shadow-hover: rgba(0, 0, 0, 0.15);
	--link-color: #0366d6;
	--link-external: #6f42c1;
	--link-hover: #8a63d2;
	--link-bg-hover: rgba(3, 102, 214, 0.08);
	--link-bg-active: rgba(3, 102, 214, 0.1);
	--error-bg: #fff8f8;
	--error-border: #ffcdd2;
	--error-content: #ffebee;
	--error-text: #cc0000;
	--toast-bg: #333;
	--toast-text: #fff;
	--unpublished-bg: rgba(128, 128, 128, 0.1);
	--unpublished-bg-hover: rgba(128, 128, 128, 0.15);
	--search-focus-shadow: rgba(3, 102, 214, 0.2);

	/* Code block colors */
	--code-bg: #f2f2f2;
	--code-border: #e0e0e0;
	--code-text: var(--text-primary);

	/* Callout colors */
	--callout-default: 8, 109, 221;
	--callout-warning: 236, 117, 0;
	--callout-tip: 0, 191, 188;
	--callout-caution: 213, 57, 132;
	--callout-important: 120, 82, 238;
	/* Full Obsidian palette (canonical types) */
	--callout-note: 8, 109, 221;
	--callout-abstract: 0, 191, 188;
	--callout-info: 8, 109, 221;
	--callout-todo: 8, 109, 221;
	--callout-success: 8, 185, 78;
	--callout-question: 236, 191, 0;
	--callout-failure: 233, 49, 71;
	--callout-danger: 233, 49, 71;
	--callout-bug: 233, 49, 71;
	--callout-example: 120, 82, 238;
	--callout-quote: 158, 158, 158;
	--callout-bg-opacity: 0.05;
}

/* Dark theme colors */
@media (prefers-color-scheme: dark) {
	:root {
		--bg-primary: #0d1117;
		--bg-secondary: #161b22;
		--bg-tertiary: #21262d;
		--text-primary: #e6edf3;
		--text-secondary: #8b949e;
		--text-muted: #7d8590;
		--border-color: #30363d;
		--border-light: #21262d;
		--shadow-color: rgba(0, 0, 0, 0.3);
		--shadow-hover: rgba(0, 0, 0, 0.4);
		--link-color: #58a6ff;
		--link-external: #a5a3ff;
		--link-hover: #79c0ff;
		--link-bg-hover: rgba(88, 166, 255, 0.1);
		--link-bg-active: rgba(88, 166, 255, 0.15);
		--error-bg: #2d1b1b;
		--error-border: #6e2c2c;
		--error-content: #3c1f1f;
		--error-text: #ff6b6b;
		--toast-bg: #21262d;
		--toast-text: #e6edf3;
		--unpublished-bg: rgba(139, 148, 158, 0.1);
		--unpublished-bg-hover: rgba(139, 148, 158, 0.15);
		--search-focus-shadow: rgba(88, 166, 255, 0.3);

		/* Code block colors - dark mode */
		--code-bg: #1e2228;
		--code-border: #30363d;
		--code-text: var(--text-primary);

		/* Callout colors - dark mode */
		--callout-default: 88, 166, 255;
		--callout-warning: 255, 158, 67;
		--callout-tip: 56, 229, 225;
		--callout-caution: 255, 123, 183;
		--callout-important: 163, 139, 255;
		/* Full Obsidian palette (canonical types) - dark mode */
		--callout-note: 88, 166, 255;
		--callout-abstract: 56, 229, 225;
		--callout-info: 88, 166, 255;
		--callout-todo: 88, 166, 255;
		--callout-success: 73, 204, 121;
		--callout-question: 255, 213, 67;
		--callout-failure: 255, 99, 120;
		--callout-danger: 255, 99, 120;
		--callout-bug: 255, 99, 120;
		--callout-example: 163, 139, 255;
		--callout-quote: 158, 158, 158;
		--callout-bg-opacity: 0.1;
	}
}

/* Manual dark theme override */
[data-theme="dark"] {
	--bg-primary: #0d1117;
	--bg-secondary: #161b22;
	--bg-tertiary: #21262d;
	--text-primary: #e6edf3;
	--text-secondary: #8b949e;
	--text-muted: #7d8590;
	--border-color: #30363d;
	--border-light: #21262d;

	--shadow-hover: rgba(0, 0, 0, 0.4);
	--link-color: #58a6ff;
	--link-external: #a5a3ff;

/* Manual light theme override */
[data-theme="light"] {
	--bg-primary: #ffffff;
	--bg-secondary: #f6f8fa;
	--bg-tertiary: #ffffff;
	--text-primary: #24292e;
	--text-secondary: #666;
	--text-muted: #999;
	--border-color: #ddd;
	--border-light: #eee;
	--shadow-color: rgba(0, 0, 0, 0.1);
	--shadow-hover: rgba(0, 0, 0, 0.15);
	--link-color: #0366d6;
	--link-external: #6f42c1;
	--link-hover: #8a63d2;
	--link-bg-hover: rgba(3, 102, 214, 0.08);
	--link-bg-active: rgba(3, 102, 214, 0.1);
	--error-bg: #fff8f8;
	--error-border: #ffcdd2;
	--error-content: #ffebee;
	--error-text: #cc0000;
	--toast-bg: #333;
	--toast-text: #fff;
	--unpublished-bg: rgba(128, 128, 128, 0.1);
	--unpublished-bg-hover: rgba(128, 128, 128, 0.15);
	--search-focus-shadow: rgba(3, 102, 214, 0.2);

	/* Code block colors */
	--code-bg: #f2f2f2;
	--code-border: #e0e0e0;
	--code-text: var(--text-primary);

	/* Callout colors */
	--callout-default: 8, 109, 221;
	--callout-warning: 236, 117, 0;
	--callout-tip: 0, 191, 188;
	--callout-caution: 213, 57, 132;
	--callout-important: 120, 82, 238;
	/* Full Obsidian palette (canonical types) */
	--callout-note: 8, 109, 221;
	--callout-abstract: 0, 191, 188;
	--callout-info: 8, 109, 221;
	--callout-todo: 8, 109, 221;
	--callout-success: 8, 185, 78;
	--callout-question: 236, 191, 0;
	--callout-failure: 233, 49, 71;
	--callout-danger: 233, 49, 71;
	--callout-bug: 233, 49, 71;
	--callout-example: 120, 82, 238;

.header {
	position: fixed;
	top: 0;
	left: 0;
	right: 0;
	height: 50px;
	background-color: var(--bg-primary);
	border-bottom: 1px solid var(--border-color);
	z-index: 1000;
	display: flex;
	align-items: center;
	padding: 0 20px;
	box-shadow: 0 1px 3px var(--shadow-color);
}

.header-left {
	flex: 1;
	display: flex;
	align-items: center;
	gap: 20px;
}

.header-right {
	display: flex;
	align-items: center;
	gap: 20px;
}

/* Code blocks */
code {
	background-color: var(--code-bg);
	border: 1px solid var(--code-border);
	border-radius: 3px;
	padding: 0.1em 0.3em;
	color: var(--code-text);
}

pre code {
	display: block;
	overflow: auto;
	padding: 1em;
}

/* Callout blocks. Static callouts render as <div>; foldable callouts
   ([!type]- / [!type]+) render as native <details>/<summary> (no JS). */
[data-callout-type] {
	background-color: rgba(var(--callout-color), var(--callout-bg-opacity));
	border-left: 5px solid rgb(var(--callout-color));
	padding: 10px;
	margin: 20px auto;
}

[data-callout-type] [data-callout-title] {
	color: rgb(var(--callout-color));
	font-weight: bold;
}

[data-callout-type] p {
	margin: 0;
}

/* Foldable callout title: clickable, hide the native disclosure marker. */
summary[data-callout-title] {
	cursor: pointer;
	list-style: none;
}

summary[data-callout-title]::-webkit-details-marker {
	display: none;
}

[data-callout-type] {
	--callout-color: var(--callout-default);
}

/* Backward-compat selectors (pre-expansion type names). */
[data-callout-type="warning"] {
	--callout-color: var(--callout-warning);
}

[data-callout-type="tip"] {
	--callout-color: var(--callout-tip);
}

[data-callout-type="caution"] {
	--callout-color: var(--callout-caution);
}

[data-callout-type="important"] {
	--callout-color: var(--callout-important);
}

/* Full Obsidian palette (canonical types). */
[data-callout-type="note"] {
	--callout-color: var(--callout-note);
}

[data-callout-type="abstract"] {
	--callout-color: var(--callout-abstract);
}

[data-callout-type="info"] {
	--callout-color: var(--callout-info);
}

[data-callout-type="todo"] {
	--callout-color: var(--callout-todo);
}

[data-callout-type="success"] {
	--callout-color: var(--callout-success);
}

[data-callout-type="question"] {
	--callout-color: var(--callout-question);
}

[data-callout-type="failure"] {
	--callout-color: var(--callout-failure);
}

[data-callout-type="danger"] {
	--callout-color: var(--callout-danger);
}

[data-callout-type="bug"] {
	--callout-color: var(--callout-bug);
}

[data-callout-type="example"] {
	--callout-color: var(--callout-example);
}

[data-callout-type="quote"] {
	--callout-color: var(--callout-quote);
}

/* Blockquotes (plain Markdown `> ...`; callouts are styled via [data-callout-type]) */
.content blockquote {
	margin: 1em 0;
	padding: 0.4em 1em;
	border-left: 4px solid var(--border-color);
	color: var(--text-secondary);
}

.content blockquote p {
	margin: 0.4em 0;
}

/* Tables */
.content table {
	border-collapse: collapse;
	margin: 1em 0;
	display: block;        /* enables horizontal scroll when wider than the panel */
	overflow-x: auto;
	max-width: 100%;
}

.content th,
.content td {
	border: 1px solid var(--border-color);
	padding: 6px 12px;
}

.content th {
	background: var(--bg-secondary);
	font-weight: 600;
	text-align: left;
}

body {
	margin: 0;
	padding: 0;
	font-family: "Helvetica Neue", Arial, sans-serif;
	font-size: 16px;
	line-height: 1.6;
	background-color: var(--bg-secondary);
	color: var(--text-primary);
}

h1, h2, h3, h4, h5, h6 {
	font-family: "Segoe UI", Arial, sans-serif;
	line-height: 1.2;
	margin-top: 1.5em;
	margin-bottom: 0.5em;
	color: var(--text-primary);
}

h1 {
	font-size: 2em;
}

h2 {
	font-size: 1.5em;
}

h3 {
	font-size: 1.17em;
}

/* base link styles */
a {
	color: var(--link-color);
	text-decoration: none;
	transition: all 0.2s ease;
}

/* internal note links */
a[href^="#"] {
	border-bottom: 1px dotted var(--link-color);
	padding-bottom: 1px;
}

a[href^="#"]:hover {
	background-color: var(--link-bg-hover);
	border-bottom: 1px solid var(--link-color);
	text-decoration: none;
}

/* add dim highlighting when linked-to note already open */
a[href^="#"].note-opened {
	background-color: var(--link-bg-active);
	border-radius: 3px;
	padding: 2px 4px;
	margin: -2px -4px;
	border-bottom: none; /* remove the dotted border for opened notes */
}

a[href^="#"].note-opened:hover {
	background-color: var(--link-bg-hover);
	text-decoration: none;
}

/* brief flash applied to a heading when navigated to via a section link */
@keyframes heading-flash {
	0%   { background-color: var(--link-bg-active); }
	100% { background-color: transparent; }
}

.heading-target {
	animation: heading-flash 2s ease-out;
	border-radius: 3px;
}

/* unpublished note links */
.unpublished-link {
	background-color: var(--unpublished-bg);
	border-radius: 3px;
	padding: 2px 4px;
	margin: -2px -4px;
	color: var(--text-secondary);
	cursor: default;  /* regular cursor instead of pointer */
}

.unpublished-link:hover {
	background-color: var(--unpublished-bg-hover);
}

/* external links */
a:not([href^="#"]) {
	color: var(--link-external);
	position: relative;
}

a:not([href^="#"]):hover {
	color: var(--link-hover);
	text-decoration: underline;
}

/* add styles for the metadata */
.note-metadata {
	display: flex;
	flex-wrap: nowrap;
	align-items: center;
	gap: 12px;
	/* Breathing room below the flush sticky title so the metadata row has a natural
	   break from the header when the note is scrolled to the very top. */
	margin-top: 10px;
	margin-bottom: 20px;
	color: var(--text-secondary);
	font-size: 0.9em;
	line-height: 1.4;
}

.note-metadata a {
	color: var(--text-secondary);
	border-bottom: 1px dotted var(--text-secondary);
}

.note-metadata a:hover {
	color: var(--link-color);
	border-bottom-color: var(--link-color);
}

.permanent-link {
	display: inline-flex;
	align-items: center;
	gap: 4px;
	color: var(--text-secondary);
	cursor: pointer;
	border-bottom: 1px dotted var(--text-secondary);
	transition: all 0.2s ease;
}

.permanent-link:hover {
	color: var(--link-color);
	border-bottom-color: var(--link-color);
}

.permanent-link svg {
	opacity: 0.7;
	transition: opacity 0.2s ease;
}

.permanent-link:hover svg {
	opacity: 1;
}

.prior-version-link,
.diff-prior-link {
	display: inline-flex;
	align-items: center;
	gap: 4px;
	color: var(--text-secondary);
	cursor: pointer;
	border-bottom: 1px dotted var(--text-secondary);
	transition: all 0.2s ease;
}

.prior-version-link:hover,
.diff-prior-link:hover {
	color: var(--link-color);
	border-bottom-color: var(--link-color);
}

.prior-version-link svg,
.diff-prior-link svg {
	opacity: 0.7;
	transition: opacity 0.2s ease;
}

.prior-version-link:hover svg,
.diff-prior-link:hover svg {
	opacity: 1;
}

.toast {
	position: fixed;
	bottom: 20px;
	left: 50%;
	transform: translateX(-50%);
	background-color: var(--toast-bg);
	color: var(--toast-text);
	padding: 8px 16px;
	border-radius: 4px;
	font-size: 14px;
	z-index: 1000;
	opacity: 0;
	transition: opacity 0.2s ease-in-out;
}

.toast.show {
	opacity: 1;
}

/* header link styles */
.header a {
	border-bottom: none;
	padding-bottom: 0;
	color: var(--text-primary);
}

.header a[href^="#"]:hover {
	background-color: transparent;
	color: var(--link-color);
}

.panels-container {
	position: fixed;
	top: 50px; /* matches header height */
	left: 0;
	right: 0;
	bottom: 0;
	overflow-y: auto;
	display: flex;
	gap: 0;
	background-color: var(--bg-secondary);
}

.panel {
	flex: 0 0 600px;
	/* No top padding: the panel is its own scroll container and a sticky child sticks at
	   the container's content-box top. Any top padding here would leave a band above the
	   stuck header that the header's opaque background can't cover, letting scrolled body
	   text peek through. Top spacing lives in the sticky .panel-header itself (and in
	   .panel.error below, whose bare non-sticky h1 has no header to carry it). */
	padding: 0 20px 10px;
	background: var(--bg-primary);
	border-right: 1px solid var(--border-color);
	height: 100%;
	overflow-y: auto;
	box-sizing: border-box;
	position: relative; /* adjust for close button positioning */
	font-size: 1rem;
	transition: all 0.3s ease;
	width: 600px;
	color: var(--text-primary);
	/* Deep-linked / backlink headings scroll via scrollIntoView({block:'start'});
	   this keeps them below the sticky panel header instead of hidden under it. */
	scroll-padding-top: 3em;
}

.panel.collapsing {
	transform-origin: right;
	transform: scaleX(0);
	width: 0 !important;          /* override any inline width set by resizing */
	flex-basis: 0 !important;     /* override any inline flex-basis set by resizing */
	padding: 0;
	margin: 0;
	border: none;
	overflow: hidden;
}

/* Disable the panel transition while actively dragging to resize so the width
   tracks the cursor instantly instead of easing behind it. */
.panel.resizing {
	transition: none;
}

/* Highlight the right edge when the cursor is in the drag-to-resize zone. */
.panel.resize-hover {
	box-shadow: inset -3px 0 0 -1px var(--link-color);
}

/* Keep the resize cursor and suppress text selection across the whole page
   while a drag is in progress (the pointer may stray off the panel). */
body.panel-resizing {
	cursor: col-resize;
	user-select: none;
}

.panel h1 {
	margin-top: 0;
	font-size: 1.8em;
	margin-right: 40px; /* adjust heading to accommodate close button */
}

/* Pin a header holding the close button + note title at the top of the panel's own
   scroll container so the reader always sees which note the panel holds — and can
   still close it — while the body scrolls under it. The metadata row is a sibling
   below this header, so it stays fully visible just beneath the sticky block.
   Excludes error panels (short markup, no long body — keep a plain non-sticky h1). */
.panel:not(.error):not(.diff-panel) > .panel-header,
.diff-panel > .panel-header {
	/* sticky also makes this the containing block for the absolutely-positioned
	   close button, so the × stays pinned to the header's top-right corner. */
	position: sticky;
	top: 0;
	z-index: 2;
	/* The panel has NO top padding, so the header's border-box top coincides exactly with
	   the scrollport top: pinned at top:0 it sits perfectly flush, with no band above it
	   for scrolled content to peek through. Negative side margins bleed the opaque
	   background across the panel's 20px side padding edge-to-edge; the header's own top
	   and bottom padding give the title breathing room and an opaque band beneath it.
	   Right padding keeps ×/title clearance. */
	margin: 0 -20px;
	padding: 12px 40px 8px 20px;
	background: var(--bg-primary); /* opaque so body doesn't bleed through */
	/* Soft edge as content slides under; box-shadow is drawn outside the box. */
	box-shadow: 0 6px 8px -6px var(--shadow-color);
}

/* Cap the title height so a very long title can't dominate the panel (~3-4 lines).
   Zero the inherited global h1 bottom margin so the header's bottom spacing is exactly
   its own 8px padding — a predictable opaque band rather than a transparent margin. */
.panel-header > h1 {
	margin-bottom: 0;
	/* Clamp to a few lines with an auto ellipsis so a long title stays compact in the
	   sticky header; the full title is available via the title="" hover tooltip. Clamps
	   at a line boundary (no mid-glyph cut). Mirrors .search-result-preview below. */
	display: -webkit-box;
	-webkit-line-clamp: 3;
	-webkit-box-orient: vertical;
	overflow: hidden;
}

.panel.error {
	background-color: var(--error-bg);
	/* Error panels render a bare, non-sticky h1 (no .panel-header), so restore the top
	   breathing room the base .panel no longer provides now that its top padding is gone. */
	padding-top: 10px;
}

.error-message {
	color: var(--error-text);
	padding: 20px;
	border: 1px solid var(--error-border);
	border-radius: 4px;
	background-color: var(--error-content);
	margin: 20px 0;
}

.backlinks {
	margin-top: 40px;
	padding-top: 20px;
	border-top: 1px solid var(--border-color);
}

/* Collapsible "Referenced by" summary: styled like the old <h3>, native
   disclosure marker hidden in favor of a rotating chevron on the left. */
.backlinks > summary.backlinks-summary {
	font-family: "Segoe UI", Arial, sans-serif;
	font-size: 1.17em;
	line-height: 1.2;
	font-weight: bold;
	color: var(--text-primary);
	margin: 0 0 0.5em;
	cursor: pointer;
	list-style: none;
	display: flex;
	align-items: center;
	gap: 0.4em;
}

.backlinks > summary.backlinks-summary::-webkit-details-marker {
	display: none;
}

.backlinks > summary.backlinks-summary::before {
	content: "\25B8"; /* ▸ */
	color: var(--text-secondary);
	font-size: 0.85em;
	transition: transform 0.2s ease;
}

details.backlinks[open] > summary.backlinks-summary::before {
	transform: rotate(90deg);
}

.backlinks-list {
	margin-top: 8px;
}

/* Comments (per-panel) */
.comments {
	margin-top: 40px;
	padding-top: 20px;
	border-top: 1px solid var(--border-color);
}
.comments-heading {
	margin: 0 0 16px;
}
.comment-item {
	padding: 10px 0;
	border-bottom: 1px solid var(--border-color);
}
.comment-replies {
	margin-top: 10px;
	padding-left: 16px;
	border-left: 2px solid var(--border-color);
}
.comment-reply-row {
	margin-top: 6px;
}
.comment-reply-btn {
	background: none;
	border: none;
	padding: 0;
	color: var(--text-secondary);
	cursor: pointer;
	font-family: inherit;
	font-size: 12px;
}
.comment-reply-btn:hover {
	color: var(--text-primary);
}
.comment-reply-form {
	display: flex;
	flex-direction: column;
	gap: 8px;
	margin-top: 6px;
}
.comment-meta {
	font-size: 12px;
	color: var(--text-secondary);
	margin-bottom: 4px;
}
.comment-author {
	font-weight: 600;
	color: var(--text-primary);
	margin-right: 8px;
}
.comment-body {
	font-size: 14px;
	line-height: 1.5;
	word-wrap: break-word;
}
.comment-body p {
	margin: 0 0 8px;
}
.comment-deleted {
	color: var(--text-secondary);
	font-style: italic;
}
.comment-edited {
	color: var(--text-secondary);
	font-size: 12px;
	margin-left: 8px;
}
.comment-actions {
	display: flex;
	align-items: center;
	gap: 12px;
	margin-top: 6px;
}
.comment-action {
	background: none;
	border: none;
	padding: 0;
	color: var(--text-secondary);
	cursor: pointer;
	font-family: inherit;
	font-size: 12px;
}
.comment-action:hover {
	color: var(--text-primary);
}
.comment-action:disabled {
	opacity: 0.5;
	cursor: default;
}
.comment-edit-form {
	display: flex;
	flex-direction: column;
	gap: 8px;
	margin-top: 6px;
}
.comment-empty {
	color: var(--text-secondary);
	font-size: 14px;
}
.comment-composer {
	margin-top: 16px;
	display: flex;
	flex-direction: column;
	gap: 8px;
}
/* position:relative so the absolutely-positioned [[ ]] autocomplete menu
   anchors to the textarea within each form (composer/reply/edit). */
.comment-composer,
.comment-reply-form,
.comment-edit-form {
	position: relative;
}
.comment-input {
	width: 100%;
	min-height: 70px;
	padding: 8px;
	border: 1px solid var(--border-color);
	border-radius: 4px;
	background-color: var(--bg-primary);
	color: var(--text-primary);
	font-family: inherit;
	font-size: 14px;
	resize: vertical;
}
.comment-input:disabled {
	opacity: 0.6;
	cursor: not-allowed;
	background-color: var(--bg-secondary);
}
/* The active comment inputs are contenteditable divs (so note-links can render
   as inline chips). They reuse the .comment-input box above; these rules add the
   textarea behaviors a div lacks. The signed-out preview stays a real <textarea>
   and uses :disabled above. */
div.comment-input {
	overflow-y: auto;
	max-height: 300px;
	white-space: pre-wrap;
	word-break: break-word;
	cursor: text;
}
/* contenteditable has no native placeholder; show data-placeholder when empty. */
div.comment-input:empty:before {
	content: attr(data-placeholder);
	color: var(--text-secondary);
	pointer-events: none;
}
/* Committed [[UID]] note-link, shown as an atomic pill inside the editor. */
.comment-chip {
	display: inline-block;
	padding: 0 6px 0 4px;
	border-radius: 4px;
	background-color: var(--unpublished-bg);
	color: var(--link-color);
	font-size: 0.9em;
	line-height: 1.4;
	white-space: nowrap;
	user-select: all;
}
.comment-chip:before {
	content: "🔗";
	margin-right: 3px;
	font-size: 0.85em;
}
/* [[ ]] note-link autocomplete dropdown (positioned via JS under the editor).
   Modeled on .search-results. */
.comment-wikilink-menu {
	position: absolute;
	z-index: 1000;
	max-height: 220px;
	overflow-y: auto;
	background: var(--bg-primary);
	border: 1px solid var(--border-color);
	border-radius: 4px;
	box-shadow: 0 4px 12px var(--shadow-color);
}
.comment-wikilink-menu-item {
	padding: 6px 12px;
	font-size: 14px;
	color: var(--text-primary);
	cursor: pointer;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}
.comment-wikilink-menu-item:hover,
.comment-wikilink-menu-item.active {
	background-color: var(--bg-secondary);
}
/* Resolved [[UID]] note-links inside comment bodies. */
.comment-body a.comment-wikilink {
	color: var(--link-color);
}
.comment-username-setup {
	display: flex;
	flex-direction: column;
	gap: 8px;
}
.comment-username-label {
	font-size: 13px;
	color: var(--text-secondary);
}
.comment-username-input {
	width: 100%;
	max-width: 260px;
	padding: 6px 8px;
	border: 1px solid var(--border-color);
	border-radius: 4px;
	background-color: var(--bg-primary);
	color: var(--text-primary);
	font-family: inherit;
	font-size: 14px;
}
.comment-username-error {
	font-size: 12px;
	color: #d33;
}
.comment-submit {
	align-self: flex-start;
	padding: 6px 14px;
	border: 1px solid var(--border-color);
	border-radius: 4px;
	background-color: var(--bg-secondary);
	color: var(--text-primary);
	cursor: pointer;
	font-size: 14px;
}
.comment-submit:hover {
	opacity: 0.85;
}
.comment-submit:disabled {
	opacity: 0.5;
	cursor: default;
}
.comment-status {
	font-size: 12px;
	color: var(--text-secondary);
}
.comment-signin {
	display: inline-block;
	padding: 6px 14px;
	border: 1px solid var(--border-color);
	border-radius: 4px;
	background-color: var(--bg-secondary);
	color: var(--text-primary);
	text-decoration: none;
	font-size: 14px;
}

.close-button {
	position: absolute;
	top: 20px;
	right: 20px;
	z-index: 3; /* stay clickable above the sticky title header (z-index: 2) */
	width: 24px;
	height: 24px;
	padding: 0; /* zero default button padding so the box stays 24×24 with a larger glyph */
	border: none;
	background: none;
	cursor: pointer;
	opacity: 0.5;
	transition: opacity 0.2s;
	font-size: 26px;
	line-height: 1;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-secondary);
}

.close-button:hover {
	opacity: 1;
}

.search-container {
	position: relative;
}

#search-input {
	width: 200px;
	padding: 6px 12px;
	border: 1px solid var(--border-color);
	border-radius: 4px;
	font-size: 14px;
	transition: all 0.2s ease;
	background-color: var(--bg-primary);
	color: var(--text-primary);
}

#search-input:focus {
	width: 300px;
	outline: none;
	border-color: var(--link-color);
	box-shadow: 0 0 0 2px var(--search-focus-shadow);
}

#search-input::placeholder {
	color: var(--text-muted);
}

.search-results {
	display: none;
	position: absolute;
	top: 100%;
	right: 0;
	width: 400px;
	max-height: 400px;
	overflow-y: auto;
	background: var(--bg-primary);
	border: 1px solid var(--border-color);
	border-radius: 4px;
	box-shadow: 0 4px 12px var(--shadow-color);
	z-index: 1000;
	margin-top: 4px;
}

.search-result-item {
	padding: 8px 12px;
	border-bottom: 1px solid var(--border-light);
	cursor: pointer;
}

.search-result-item:last-child {
	border-bottom: none;
}

.search-result-item:hover {
	background-color: var(--bg-secondary);
}

.search-result-title {
	font-weight: 500;
	color: var(--link-color);
	margin-bottom: 4px;
}

.search-result-preview {
	font-size: 13px;
	color: var(--text-secondary);
	display: -webkit-box;
	-webkit-line-clamp: 2;
	-webkit-box-orient: vertical;
	overflow: hidden;
}

.search-results.active {
	display: block;
}

/* Theme toggle button */
.theme-toggle {
	background: none;
	border: 1px solid var(--border-color);
	border-radius: 4px;
	padding: 6px 8px;
	cursor: pointer;
	color: var(--text-primary);
	font-size: 16px;
	transition: all 0.2s ease;
	display: flex;
	align-items: center;
	justify-content: center;
	width: 32px;
	height: 32px;
}

.theme-toggle:hover {
	background-color: var(--bg-secondary);
}

	--d2h-change-ins-color: var(--d2h-dark-change-ins-color);
	--d2h-info-bg-color: var(--d2h-dark-info-bg-color);
	--d2h-info-border-color: var(--d2h-dark-info-border-color);
	--d2h-change-label-color: var(--d2h-dark-change-label-color);
	--d2h-moved-label-color: var(--d2h-dark-moved-label-color);
	}
}

/* CPN diff-panel chrome */
.diff-panel .diff-header {
	display: flex;
	justify-content: space-between;
	gap: 1em;
	font-size: 0.85em;
	color: var(--text-secondary);
	margin-bottom: 0.75em;
	padding-bottom: 0.5em;
	border-bottom: 1px solid var(--border-color);
}
.diff-panel .diff-header .diff-side strong {
	color: var(--text-primary);
}
.diff-panel .diff-side-old::before { content: "− "; color: var(--d2h-del-label-color); }
.diff-panel .diff-side-new::before { content: "+ "; color: var(--d2h-ins-label-color); }
.diff-body { font-size: 0.95em; }
/* drawFileList:false still emits a per-file header; we show our own instead. */
.diff-body .d2h-file-header { display: none; }
/* Keep side-by-side columns scrollable when a panel is dragged narrow. */
.diff-body .d2h-file-side-diff { overflow-x: auto; }
.diff-notice {
	background-color: var(--bg-secondary);
	border: 1px solid var(--border-color);
	border-radius: 4px;
	color: var(--text-secondary);
	font-size: 0.9em;
	margin: 0.75em 0;
	padding: 0.5em 0.75em;
}

/* LLM chat (site-wide, floating). Hidden until config enables chatEnabled. */
.cpn-chat-launcher {
	position: fixed;
	right: 20px;
	bottom: 20px;
	z-index: 900;
	border: 1px solid var(--border-color);
	background-color: var(--bg-secondary);
	color: var(--text-primary);
	border-radius: 999px;
	padding: 0.6em 1.1em;
	font-size: 0.95em;
	cursor: pointer;
	box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.cpn-chat-launcher:hover { background-color: var(--bg-primary); }
.cpn-chat-panel {
	position: fixed;
	right: 20px;
	bottom: 20px;
	z-index: 901;
	width: min(420px, calc(100vw - 40px));
	height: min(560px, calc(100vh - 40px));
	/* Cap any drag-set inline size to the viewport; if the window later shrinks
	   the box is clamped by the browser without a JS resize listener. */
	max-width: calc(100vw - 40px);
	max-height: calc(100vh - 40px);
	display: flex;
	flex-direction: column;
	background-color: var(--bg-primary);
	border: 1px solid var(--border-color);
	border-radius: 10px;
	box-shadow: 0 4px 20px rgba(0,0,0,0.25);
	overflow: hidden;
}
/* Drag-to-resize grip. The panel is anchored bottom-right, so the free corner
   is top-left; dragging it up/left grows the box (see the resize handler). */
.cpn-chat-resize {
	position: absolute;
	top: 0;
	left: 0;
	width: 16px;
	height: 16px;
	cursor: nwse-resize;
	z-index: 1; /* above the header so the corner grip wins the pointer */
}
.cpn-chat-resize::before {
	content: "";
	position: absolute;
	top: 4px;
	left: 4px;
	width: 7px;
	height: 7px;
	border-top: 2px solid var(--text-secondary);
	border-left: 2px solid var(--text-secondary);
	opacity: 0.4;
}
.cpn-chat-panel:hover .cpn-chat-resize::before { opacity: 0.8; }
/* No height drag while collapsed — hide the grip so only the header bar shows. */
.cpn-chat-panel.cpn-chat-collapsed .cpn-chat-resize { display: none; }
/* Suppress selection + keep the resize cursor across the page during a drag
   (the pointer may stray off the grip). Mirrors body.panel-resizing. */
body.cpn-chat-resizing { cursor: nwse-resize; user-select: none; }
.cpn-chat-header {
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 0.6em 0.9em;
	border-bottom: 1px solid var(--border-color);
	background-color: var(--bg-secondary);
	font-weight: 600;
	cursor: pointer; /* slim collapsed bar is clickable to expand */
}
.cpn-chat-collapse {
	background: none;
	border: none;
	color: var(--text-secondary);
	font-size: 1.3em;
	line-height: 1;
	cursor: pointer;
}
/* Collapsed: shrink to just the header bar; hide the log + input but keep them
   in the DOM so the conversation and any typed text are preserved on expand. */
.cpn-chat-panel.cpn-chat-collapsed {
	height: auto;
}
.cpn-chat-panel.cpn-chat-collapsed .cpn-chat-log,
.cpn-chat-panel.cpn-chat-collapsed .cpn-chat-form {
	display: none;
}
.cpn-chat-panel.cpn-chat-collapsed .cpn-chat-header {
	border-bottom: none;
}
.cpn-chat-log {
	flex: 1;
	overflow-y: auto;
	padding: 0.9em;
	display: flex;
	flex-direction: column;
	gap: 0.75em;
}
.cpn-chat-msg { max-width: 90%; padding: 0.55em 0.75em; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; }
.cpn-chat-msg.user { align-self: flex-end; background-color: var(--bg-secondary); }
.cpn-chat-msg.assistant { align-self: flex-start; background-color: var(--bg-secondary); }
.cpn-chat-citations { margin-top: 0.5em; font-size: 0.85em; }
.cpn-chat-citations a { display: inline-block; margin-right: 0.5em; }
.cpn-chat-form { display: flex; gap: 0.5em; padding: 0.75em; border-top: 1px solid var(--border-color); }
.cpn-chat-input {
	flex: 1;
	resize: none;
	border: 1px solid var(--border-color);
	border-radius: 6px;
	background-color: var(--bg-primary);
	color: var(--text-primary);
	padding: 0.5em;
	font-family: inherit;
	font-size: 0.95em;
}
.cpn-chat-send {
	border: 1px solid var(--border-color);
	background-color: var(--bg-secondary);
	color: var(--text-primary);
	border-radius: 6px;
	padding: 0 0.9em;
	cursor: pointer;
}
.cpn-chat-send:disabled { opacity: 0.5; cursor: default; }

	</style>
</head>
<body>
	<header class="header">
		<div class="header-left">
			<a href="#/pindex" class="home-link">Home</a>
		</div>
		<div class="header-right">
			<div class="search-container">
				<input type="text" id="search-input" placeholder="Search notes..." aria-label="Search notes">
				<div id="search-results" class="search-results"></div>
			</div>
			<button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
				<span class="theme-icon">🌙</span>
			</button>
		</div>
	</header>

	<div class="panels-container" id="panels"></div>

	<!-- CPN chat begin: extracted verbatim into SITE_CHAT_HTML by npm run synth:site
	     (see infrastructure/bin/synth-site-assets.ts) and injected into the
	     {{CHAT_HTML}} template slot only for chat-enabled profiles. -->
	<!-- LLM chat over the published corpus. Hidden unless config.chatEnabled. -->
	<button id="cpn-chat-launcher" class="cpn-chat-launcher" hidden>💬 Ask these notes</button>
	<div id="cpn-chat-panel" class="cpn-chat-panel" hidden>
		<div id="cpn-chat-resize" class="cpn-chat-resize" aria-hidden="true" title="Drag to resize"></div>
		<div class="cpn-chat-header" id="cpn-chat-header">
			<span>Ask these notes</span>
			<button id="cpn-chat-collapse" class="cpn-chat-collapse" aria-label="Collapse chat" aria-expanded="true">⌄</button>
		</div>
		<div id="cpn-chat-log" class="cpn-chat-log"></div>
		<form id="cpn-chat-form" class="cpn-chat-form">
			<textarea id="cpn-chat-input" class="cpn-chat-input" rows="2" placeholder="Ask a question about these notes…" aria-label="Ask a question"></textarea>
			<button type="submit" id="cpn-chat-send" class="cpn-chat-send">Send</button>
		</form>
	</div>
	<!-- CPN chat end -->

	<script>


		// --- Note-title index ------------------------------------------------
		// Shared by the header FlexSearch box AND the comment [[ ]] wikilink
		// feature. contentIndex.json ({ [uid]: { title, content } }) is fetched
		// ONCE per page load and memoized (mirrors fetchMapping's shared-promise
		// pattern) so both consumers share a single network round-trip. When the
		// file is absent (publishContentIndex off) the fetch resolves to null and
		// both structures stay empty: header search has nothing to index and
		// comment wikilinks degrade to inert greyed-out text with no autocomplete.
		// Declared before searchIndex so these initialize even in the jsdom unit
		// test, where the FlexSearch constructor below is unavailable and throws.
		const noteTitleMap = new Map();   // uid -> current display title (render path)
		let noteTitleList = [];           // [{ uid, title }] (composer autocomplete)
		let noteIndexPromise = null;

		// --- Password read-gate re-auth ---------------------------------------
		// The built-in password read-gate (password-edge.js Lambda@Edge) answers
		// an unauthenticated request with the branded unlock page. For a top-level
		// navigation that page is the document and the SPA never runs. But a data
		// subresource fetch (/notes/*.json, /static/**, config.json) issued after
		// the session cookie has silently expired ALSO hits the gate — the edge
		// returns 401 + `x-cpn-auth: required` (and, before that edge fix ships or
		// from an older edge, a 200 whose body is the unlock HTML). Left unhandled
		// the client would try to parse that as note JSON, fail, and render the
		// misleading "you may not have permission to view it" panel.
		//
		// This bites iPhone/Safari specifically: the cookie is set client-side via
		// document.cookie, and Safari ITP caps script-set first-party cookies to
		// ~7 days regardless of Max-Age, so the session lapses while the cached
		// index document keeps running — only the subresource fetch reveals it.
		//
		// cpnAuthGate detects that gated response and forces a single top-level
		// reload (which also busts bfcache) so the edge serves the unlock page as
		// the document and the reader re-enters the password. A sessionStorage
		// one-shot prevents an infinite reload loop if the document itself is still
		// served from HTTP cache without a valid cookie. Returns true when the
		// caller must stop and NOT attempt response.json().
		function cpnAuthGate(response) {
			const authHdr = response.headers.get('x-cpn-auth');
			const ct = response.headers.get('content-type') || '';
			// text/html on a data path is the pre-Fix-2 signal (unlock page served
			// as 200); the header / 401 are the clean post-Fix-2 signals. A JSON /
			// static data resource never legitimately returns HTML, so no false
			// positive on real data.
			const gated = authHdr === 'required' || response.status === 401 ||
				(response.ok && ct.indexOf('text/html') !== -1);
			if (!gated) return false;
			if (sessionStorage.getItem('cpn_pw_reload') === '1') return true;
			sessionStorage.setItem('cpn_pw_reload', '1');
			location.reload();
			return true;
		}

		// Create a new FlexSearch index
		const searchIndex = new FlexSearch.Document({
			document: {
				id: "uid",
				index: ["title", "content"],
				store: ["title", "content", "uid"] // Store these fields for display
			},
			tokenize: "forward",
			context: {
				resolution: 9,
				depth: 2,
				bidirectional: true
			}
		});

		// Populate the two derived structures from a parsed content index. Kept
		// as a named (hoisted) function so the comment-sanitizer test can seed a
		// known uid->title mapping before exercising the wikilink render rule.
		function setNoteIndex(indexData) {
			noteTitleMap.clear();
			noteTitleList = [];
			if (!indexData) return;
			Object.keys(indexData).forEach(uid => {
				const entry = indexData[uid];
				const title = entry && entry.title;
				if (typeof title === 'string' && title.length) {
					noteTitleMap.set(uid, title);
					noteTitleList.push({ uid, title });
				}
			});
		}

		// Memoized fetch of the content index. Resolves to the parsed map, or
		// null on 404/error. A failed fetch is not cached hard — the memo is
		// cleared so a later caller can retry. On first success the derived
		// structures above are populated via setNoteIndex.
		function loadNoteIndexOnce() {
			if (!noteIndexPromise) {
				noteIndexPromise = fetch('/static/content/contentIndex.json')
					.then(res => {
						if (cpnAuthGate(res)) throw new Error('auth');
						if (!res.ok) throw new Error('HTTP ' + res.status);
						return res.json();
					})
					.then(data => {
						console.log('Content index loaded successfully:', Object.keys(data).length, 'entries');
						setNoteIndex(data);
						return data;
					})
					.catch(error => {
						console.error('Error loading content index:', error);
						noteIndexPromise = null;
						return null;
					});
			}
			return noteIndexPromise;
		}

		// Updated search function using FlexSearch
		async function performSearch(query) {
			if (!query || query.length < 2) return [];
			
			const results = await searchIndex.search(query, {
				limit: 10,
				enrich: true
			});

			// Format results, deduplicating across field result sets
			const formattedResults = [];
			const seenUids = new Set();
			results.forEach(field => {
				field.result.forEach(item => {
					const doc = item.doc;
					if (seenUids.has(doc.uid)) return;
					seenUids.add(doc.uid);
					
					// Create preview with highlighted match
					let preview = doc.content;
					if (preview.length > 150) {
						preview = preview.substring(0, 150) + '...';
					}

					formattedResults.push({
						uid: doc.uid,
						title: doc.title,
						preview: preview
					});
				});
			});
			return formattedResults;
		}

		// Setup search functionality
		async function setupSearch() {
			const searchInput = document.getElementById('search-input');
			const searchResults = document.getElementById('search-results');

			if (!searchInput || !searchResults) {
				console.error('Search elements not found:', {
					searchInput: !!searchInput,
					searchResults: !!searchResults
				});
				return;
			}

			let searchTimeout;

			searchInput.addEventListener('input', (e) => {
				clearTimeout(searchTimeout);

				searchTimeout = setTimeout(async () => {
					const query = e.target.value.trim();

					if (query.length < 2) {
						searchResults.classList.remove('active');
						return;
					}

					const results = await performSearch(query);

					if (results.length > 0) {
						searchResults.innerHTML = results
							.map(result => `
								<div class="search-result-item" data-uid="${result.uid}">
									<div class="search-result-title">${result.title}</div>
									<div class="search-result-preview">${result.preview}</div>
								</div>
							`)
							.join('');
						searchResults.classList.add('active');
					} else {
						searchResults.innerHTML = `
							<div class="search-result-item">
								<div class="search-result-title">No results found</div>
							</div>
						`;
						searchResults.classList.add('active');
					}
				}, 200);
			});

			// Handle clicking search results
			searchResults.addEventListener('click', (e) => {
				const resultItem = e.target.closest('.search-result-item');
				console.log(resultItem);
				if (resultItem && resultItem.dataset.uid) {
					addPanel('u', resultItem.dataset.uid);
					searchResults.classList.remove('active');
					searchInput.value = '';
				}
			});

			// Close search results when clicking outside
			document.addEventListener('click', (e) => {
				if (!e.target.closest('.search-container')) {
					searchResults.classList.remove('active');
				}
			});
		}

    // Main search initialization
    async function initializeSearch() {
        try {
            const contentIndex = await loadNoteIndexOnce();
            if (!contentIndex) {
                console.error('Failed to load content index');
                return;
            }

            Object.entries(contentIndex).forEach(([uid, note]) => {
                searchIndex.add({uid: uid, title: note.title, content: note.content});
            });

            setupSearch();
        } catch (error) {
            console.error('Initialization failed:', error);
        }
    }

		// Initialize
		initializeSearch().catch(error => {console.error('Top-level initialization error:', error);});






		function parseURLFragment(fragment) {
			if (!fragment) return [];

			// Remove the leading '#' if present
			fragment = fragment.startsWith('#') ? fragment.slice(1) : fragment;
			if (!fragment) return [];

			let segments;

			if (fragment.charAt(0) === '/') {
				// No base note name — all segments are parameters
				segments = fragment.slice(1).split('/').filter(Boolean);
			} else {
				// First segment is a decorative slug — discard it
				const parts = fragment.split('/').filter(Boolean);
				segments = parts.slice(1); // drop the slug
			}

			// Each segment is `{type}{id}` optionally followed by `;key=value`
			// per-note parameters. Split on ';' first: the first token is the
			// existing `{type}{id}`; the rest are parameters. Parsing is lenient and
			// order-independent — tokens with no '=' are ignored, duplicate keys are
			// last-wins, and unknown keys never throw. This keeps old and new share
			// links forward- and backward-compatible as parameters are added.
			return segments.map(seg => {
				const [head, ...paramToks] = seg.split(';');
				const params = {};
				for (const tok of paramToks) {
					const eq = tok.indexOf('='); // split on the FIRST '=' only
					if (eq === -1) continue;     // no '=' → not a key=value pair, ignore
					const key = decodeURIComponent(tok.slice(0, eq));
					params[key] = decodeURIComponent(tok.slice(eq + 1)); // last-wins
				}
				return {
					type: head.charAt(0),
					value: decodeURIComponent(head.slice(1)),
					params
				};
			});
		}

		// Resolve a `{type}{value}` target to the content hash that names its JSON
		// file. Shared by loadNoteByParameter() (the base segment) and the diff
		// engine (the ;diff= mini-target) so both sides resolve identically.
		// Returns a hash string, or THROWS on an unknown type / unresolvable id —
		// callers decide whether to swallow (base load → error panel) or degrade
		// (diff target → render base note alone).
		// In-memory memo for the static mapping files. Keyed by path -> Promise of the
		// parsed JSON, so N concurrent resolveHash() callers (e.g. a stack of notes
		// fanning out in loadPanelsFromURL) share ONE in-flight fetch per file instead
		// of issuing N identical requests. The mapping files are static per deploy, so
		// caching for the page session is safe. Failures are not cached (the entry is
		// dropped) so a transient error can be retried on the next call.
		const mappingCache = new Map();
		function fetchMapping(path) {
			if (!mappingCache.has(path)) {
				mappingCache.set(path, fetch(path).then(r => {
					if (cpnAuthGate(r)) throw new Error('auth');
					if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`);
					return r.json();
				}).catch(err => { mappingCache.delete(path); throw err; }));
			}
			return mappingCache.get(path);
		}

		async function resolveHash(type, value) {
			let hash;
			switch (type) {
				case 't': // Title/slug
					console.log('Resolving by title');
					const slugMap = await fetchMapping('/static/mapping/slug-to-uid.json');
					const uid = slugMap[value];
					if (!uid) throw new Error(`No note found with title: ${value}`);

					const uidMap = await fetchMapping('/static/mapping/uid-to-hash.json');
					hash = uidMap[uid];
					break;

				case 'u': // UUID
					console.log('Resolving by UUID');
					const uidHashMap = await fetchMapping('/static/mapping/uid-to-hash.json');
					hash = uidHashMap[value];
					break;

				case 'p': // Permanent/hash
					console.log('Resolving by hash');
					hash = value;
					break;

				default:
					// Note: the old 'd' (diff) segment type is deprecated in favor of the
					// ;diff= sub-parameter and intentionally falls here.
					throw new Error(`Unknown parameter type: ${type}`);
			}

			if (!hash) throw new Error('Could not resolve note hash');
			return hash;
		}

		async function loadNoteByParameter(type, value) {
			console.log('Loading note with type:', type, 'value:', value);

			try {
				const hash = await resolveHash(type, value);

				// Load the actual note data
				const response = await fetch(`/notes/${hash}.json`);
				if (cpnAuthGate(response)) return null;
				if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
				const noteData = await response.json();
				sessionStorage.removeItem('cpn_pw_reload');
				// Stamp the resolved hash so the comment client has a reliable
				// revision anchor (it is not otherwise guaranteed on noteData for
				// u/t loads). Also firms up the permalink UI.
				noteData.hash = hash;
				return noteData;

			} catch (error) {
				console.error('Error loading note:', error);
				return null;
			}
		}
































		async function loadNote(uid) {
			try {
				const response = await fetch(`/notes/${encodeURIComponent(uid)}.json`);
				if (cpnAuthGate(response)) return null;
				if (!response.ok) {
					if (response.status === 403) {
						throw new Error('Forbidden');
					}
					if (response.status === 404) {
						throw new Error('Note not found');
					}
					throw new Error(`HTTP error! status: ${response.status}`);
				}
				const noteData = await response.json();
				sessionStorage.removeItem('cpn_pw_reload');
				return noteData;
			} catch (error) {
				console.error('Error loading note:', error);
				return null;
			}
		}

		// Per-note panel width bounds (px). Single source of truth shared by the
		// inbound-width resolver, updateURL's default-omit check, and the drag-to-
		// resize handler below. Inbound out-of-range widths fall back to the
		// default; a live drag clamps into [MIN, MAX] (see resolveWidth + the
		// resize IIFE).
		const PANEL_MIN_WIDTH = 200;
		const PANEL_MAX_WIDTH = 1600;
		const PANEL_DEFAULT_WIDTH = 600;

		// Serialize a per-note parameter object into a `;key=value` suffix, e.g.
		// `;width=800`. Values are encodeURIComponent-encoded (so a value
		// containing the reserved ';' or '=' can't corrupt the structure) and keys
		// are emitted in a stable alphabetical order so URLs are deterministic.
		// Mirrors parseURLFragment() above and serializeParams() in urlScheme.ts.
		function serializeParams(params) {
			return Object.keys(params).sort().map(k =>
				`;${encodeURIComponent(k)}=${encodeURIComponent(String(params[k]))}`
			).join('');
		}

		// Collect the known per-note parameters a panel currently carries, reading
		// them back from its datasets. Known keys: `diff` (the rendered diff target)
		// and `width` (omitted when it equals the default, to keep shared links
		// clean). serializeParams sorts keys, so output is `;diff=...;width=...`.
		// NOTE: only known keys are re-emitted — an unknown parameter present on an
		// inbound URL is dropped on the next updateURL(). parseURLFragment() still
		// returns the full params object, so preserving unknowns verbatim later is a
		// panel-local change.
		function collectPanelParams(panel) {
			const params = {};
			if (panel.dataset.diff) {
				params.diff = panel.dataset.diff;
			}
			const width = parseInt(panel.dataset.width, 10);
			if (Number.isFinite(width) && width !== PANEL_DEFAULT_WIDTH) {
				params.width = width;
			}
			return params;
		}

		// Resolve an inbound `width` parameter to a usable pixel value, or null to
		// mean "use the CSS default". Unlike a live drag (which clamps into range),
		// a malformed or out-of-range inbound value falls back to the default
		// silently — a shared link with a nonsense width shouldn't half-apply. An
		// explicit value equal to the default also resolves to null so that
		// `;width=600` normalizes to a clean, default-looking panel (idempotent
		// with updateURL, which omits the default).
		function resolveWidth(raw) {
			const n = parseInt(raw, 10);
			if (Number.isFinite(n) && n >= PANEL_MIN_WIDTH && n <= PANEL_MAX_WIDTH
				&& n !== PANEL_DEFAULT_WIDTH) {
				return n;
			}
			return null;
		}

		// Apply a resolved width to a panel: set both width and flex-basis so the
		// flex layout honors it, and record it on the dataset so updateURL can
		// re-serialize it. A null width leaves the CSS default (600px) in force and
		// clears any dataset width so the parameter is omitted from the URL.
		function applyPanelWidth(panel, width) {
			if (width === null) {
				delete panel.dataset.width;
				panel.style.width = '';
				panel.style.flexBasis = '';
				return;
			}
			panel.style.width = width + 'px';
			panel.style.flexBasis = width + 'px';
			panel.dataset.width = String(width);
		}

		// Function to update URL based on current panel stack
		function updateURL(useReplaceState = false) {
			const panels = Array.from(document.querySelectorAll('.panel'));

			if (panels.length === 0) {
				history.pushState(null, '', window.location.pathname);
				return;
			}

			// Build parameter path: /{type}{value}{;k=v...} for each panel
			const paramPath = panels.map(panel => {
				const type = panel.dataset.paramType;
				const value = panel.dataset.paramValue;
				return `/${type}${encodeURIComponent(value)}${serializeParams(collectPanelParams(panel))}`;
			}).join('');

			// Read slug from first panel for the base note name. Strip '/' (slugs of
			// folder-nested notes preserve '/') → the fragment's first '/'-delimited
			// segment is a single decorative token, so parseURLFragment discards exactly
			// one segment. Without this, a shared URL's multi-segment slug leaks its tail
			// into the note list as bogus panels.
			const slug = (panels[0].dataset.slug || '').replace(/\//g, '-');
			const newURL = slug ? `#${slug}${paramPath}` : `#${paramPath}`;

			if (useReplaceState) {
				history.replaceState(null, '', newURL);
			} else {
				history.pushState(null, '', newURL);
			}
		}

		// Function to load panels from URL
		async function loadPanelsFromURL() {
			// Clear existing panels
			const container = document.getElementById('panels');
			container.innerHTML = '';
			loadedPanels.clear();

			// Get parameters from URL
			const hash = window.location.hash.slice(1);
			if (!hash) {
				// If no hash, load home note
				if (window.__CPN_HOME_UID__) {
					await addPanel('u', window.__CPN_HOME_UID__);
				} else {
					await addPanel('p', 'index');
				}
				return;
			}

			// Load each panel in order
			const params = parseURLFragment(hash);
			if (params.length === 0) {
				// Bare slug or empty parameters — fall back to home note
				if (window.__CPN_HOME_UID__) {
					await addPanel('u', window.__CPN_HOME_UID__);
				} else {
					await addPanel('p', 'index');
				}
				return;
			}
			// Fan out all note fetches concurrently, then attach in strict URL order.
			// Promise.all preserves index order regardless of which fetch resolves
			// first, and resolvePanelData never rejects, so one bad note degrades to an
			// error panel without failing the batch. This replaces the old serial
			// `await addPanel(...)` loop where panel N's fetch didn't start until panel
			// N-1 was fully in the DOM (the visible per-note staggered-render delay).
			const resolved = await Promise.all(
				params.map(p => resolvePanelData(p.type, p.value, p.params))
			);

			let firstPanel = null;
			for (const r of resolved) {
				const panel = attachResolvedPanel(r);
				if (panel && !firstPanel) firstPanel = panel;
			}

			// Bookkeeping once for the whole batch: refresh link state, write a single
			// history entry (replaceState — the initial load shouldn't push K entries),
			// and scroll once to the base (leftmost) note rather than K times.
			updateOpenedNoteLinks();
			updateURL(true);
			if (firstPanel) firstPanel.scrollIntoView({ behavior: 'smooth', inline: 'start' });
		}

		// Store loaded panels to prevent duplicates
		let loadedPanels = new Set();

		// Compute the dedupe/identity key for a panel. A plain note is `${type}-${value}`
		// (e.g. "u-<uid>"); a note shown WITH a diff is semantically distinct from the
		// same note shown plain, so the diff target is folded into the key. This lets
		// `#/uABC` and `#/uABC;diff=pHASH` coexist as separate panels rather than one
		// silently satisfying the other. Every loadedPanels read/write and every panel
		// lookup must route through here so the two views never collide.
		function panelKey(type, value, params) {
			const base = `${type}-${value}`;
			return (params && params.diff) ? `${base};diff=${params.diff}` : base;
		}

		function updateOpenedNoteLinks() {
			// Get all note links
			document.querySelectorAll('a[href^="#"]').forEach(link => {
				const href = link.getAttribute('href').slice(1);
				const params = parseURLFragment(href);

				if (params.length > 0) {
					const { type, value, params: segParams } = params[0];
					const panelId = panelKey(type, value, segParams);

					if (loadedPanels.has(panelId)) {
						link.classList.add('note-opened');
					} else {
						link.classList.remove('note-opened');
					}
				}
			});
		}

		function scrollToPanel(panelId) {
			// panelId is the panelKey() string (e.g. "u-<uid>" or "u-<uid>;diff=pHASH").
			// Rather than reverse-parse it, match the panel that stored the same key on
			// its data-panel-id dataset — robust against values that themselves contain
			// '-', ';', or '=' (CSS.escape handles selector-special chars).
			const panel = document.querySelector(
				`.panel[data-panel-id="${CSS.escape(panelId)}"]`
			);
			if (panel) {
				panel.scrollIntoView({ behavior: 'smooth', inline: 'start' });
			}
			return panel || null;
		}

		// Scroll a panel to one of its heading ids and briefly highlight it.
		// Scoped to the given panel because heading ids are only unique within a
		// single note's rendered HTML (the same note, or two notes with colliding
		// slugs, may be open in multiple panels at once).
		function scrollToHeading(panelEl, headingSlug) {
			if (!panelEl || !headingSlug) return;
			// CSS.escape guards slugs that start with a digit or contain selector-
			// special characters (e.g. a "## 2024 plans" heading -> id "2024-plans").
			const target = panelEl.querySelector('#' + CSS.escape(headingSlug));
			if (!target) return; // missing/renamed heading -> graceful no-op
			target.scrollIntoView({ behavior: 'smooth', block: 'start' });
			target.classList.add('heading-target');
			setTimeout(() => target.classList.remove('heading-target'), 2000);
		}

		function createPanel(noteData, position, isError = false) {
			const panel = document.createElement('div');
			const isDiff = !isError && !!noteData.diffHtml;
			panel.className = `panel${isError ? ' error' : ''}${isDiff ? ' diff-panel' : ''}`;
			panel.dataset.uid = noteData.uid;
			panel.dataset.slug = noteData.slug || '';

			// Per-note named style: add the marker class the config bootstrap
			// injected scoped CSS for (window.__cpnStyleClass keeps the class name
			// and the injected selector in perfect agreement, and sanitizes so a
			// frontmatter value can't break out into extra classes). If the class
			// isn't defined in config.styles it simply has no rule ⇒ default look.
			// Error/diff panels intentionally stay unstyled.
			if (!isError && !isDiff && noteData.style && window.__cpnStyleClass) {
				panel.classList.add(window.__cpnStyleClass(noteData.style));
			}

			const closeButton = `
				<button class="close-button" aria-label="Close panel">×</button>
			`;

			if (isError) {
				panel.innerHTML = `
${closeButton}
<h1>Error Loading Note</h1>
<div class="error-message">
	<p>Unable to load the note "${noteData.uid}".</p>
	<p>${noteData.errorMessage || 'The note might not exist or you may not have permission to view it.'}</p>
</div>
				`;
			} else if (noteData.diffHtml) {
				// Diff view: this note (right/new) compared against a ;diff= target
				// (left/old). The header makes the two sides explicit since the diff
				// model privileges the base note as "right". The body is diff2html's
				// own HTML-escaped output, injected as trusted markup. Backlinks and
				// comments are intentionally omitted — a diff is not a commentable note.
				// Short hashes only (content hashes are alphanumeric, safe by design).
				const meta = noteData.diffMeta || {};
				const shortHash = (h) => (h ? String(h).slice(0, 8) : '?');
				panel.innerHTML = `
					<div class="panel-header">
						${closeButton}
						<h1 title="Diff: ${escapeHtml(noteData.title)}">Diff: ${noteData.title}</h1>
					</div>
					<div class="diff-header">
						<span class="diff-side diff-side-old">old <strong>${shortHash(meta.left)}</strong></span>
						<span class="diff-side diff-side-new">new <strong>${shortHash(meta.right)}</strong></span>
					</div>
					<div class="diff-body">${noteData.diffHtml}</div>
				`;
			} else {
				// Only create metadata section if we have either lastUpdated or hash
				const hasMetadata = noteData.lastUpdated || noteData.hash || noteData.priorHash;
				
				// Format the timestamp if it exists
				const lastUpdatedHtml = noteData.lastUpdated ? `
					<div>Updated: ${(() => {
						const d = new Date(noteData.lastUpdated);
						const pad = (n) => n.toString().padStart(2, '0');
						return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
					})()}</div>
				` : '';

				// Create permanent link if hash exists
				const permanentLinkHtml = noteData.hash ? `
					<div title="Click to copy permanent link">
						<span class="permanent-link" data-permalink="#/p${noteData.hash}" role="button" tabindex="0">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
								<path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
							</svg>
						</span>
					</div>
				` : '';

				// Prior-version link if a prior hash exists (opens prior note in a new panel
				// via the existing #/p{hash} note-link handler — no extra JS needed)
				const priorVersionHtml = noteData.priorHash ? `
					<div>
						<a class="prior-version-link" href="#/p${noteData.priorHash}" title="View previous version" role="button">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
								<path d="M3 3v5h5"></path>
								<path d="M12 7v5l4 2"></path>
							</svg>
						</a>
					</div>
				` : '';

				// "Diff vs previous" affordance: opens this note diffed against its prior
				// version via #/u{uid};diff=p{priorHash}. Uses the stable uid for the base
				// segment so the link survives future revisions, and routes through the
				// normal note-link click handler (which threads ;diff= to addPanel).
				const diffPriorHtml = (noteData.priorHash && noteData.uid) ? `
					<div>
						<a class="diff-prior-link" href="#/u${encodeURIComponent(noteData.uid)};diff=p${noteData.priorHash}" title="Compare with previous version" role="button">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<path d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4"></path>
								<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
								<line x1="12" y1="3" x2="12" y2="21"></line>
							</svg>
						</a>
					</div>
				` : '';

				// Non-fatal diff notice (identical versions, or a diff that could not be
				// built) — the note still renders normally beneath it.
				const diffNoticeHtml = noteData.diffNotice ? `
					<div class="diff-notice">${noteData.diffNotice}</div>
				` : '';

				panel.innerHTML = `
					<div class="panel-header">
						${closeButton}
						<h1 title="${escapeHtml(noteData.title)}">${noteData.title}</h1>
					</div>
					${hasMetadata ? `
						<div class="note-metadata">
							${lastUpdatedHtml}
							${permanentLinkHtml}
							${priorVersionHtml}
							${diffPriorHtml}
						</div>
						` : ''}
					${diffNoticeHtml}
					<div class="content">${noteData.content}</div>
					${noteData.backlinks.length ? `
			<details class="backlinks" open>
				<summary class="backlinks-summary">Referenced by:</summary>
				<div class="backlinks-list">
					${noteData.backlinks.map(link =>
						`<div><a href="#/u${encodeURIComponent(link.uid)}">${link.title}</a></div>`
					).join('')}
				</div>
			</details>
					` : ''}
					<div class="comments" hidden></div>
				`;
			}

			// Add click handlers for links
			panel.querySelectorAll('a[href^="#"]').forEach(link => {
				// Remove any existing click handlers first
				const newLink = link.cloneNode(true);
				link.parentNode.replaceChild(newLink, link);
				
				newLink.addEventListener('click', (e) => {
					e.preventDefault();
					e.stopPropagation(); // Stop event bubbling

					// Section-anchor target (if any), set by remarkObsidianLinks and
					// preserved across the cloneNode above.
					const headingSlug = newLink.dataset.heading || null;

					// Same-note link [[#Heading]]: scroll within THIS panel (the one
					// containing the link). Its href is just "#", so handle it before
					// the URL-fragment parsing below (which would yield no params).
					if (newLink.dataset.sameNote === 'true') {
						if (headingSlug) scrollToHeading(panel, headingSlug);
						return;
					}

					const href = newLink.getAttribute('href').slice(1);
					console.log('Raw href:', href);

					const params = parseURLFragment(href);
					console.log('Parsed params:', params);

					if (params.length > 0) {
						const { type, value, params: segParams } = params[0];
						console.log('Using type:', type, 'value:', value);

						// If panel is already loaded, scroll to it. Key on the full
						// segment (incl. any ;diff=) so a "diff vs previous" link opens a
						// distinct diff panel rather than matching the plain note.
						const panelId = panelKey(type, value, segParams);
						if (loadedPanels.has(panelId)) {
							const openPanel = scrollToPanel(panelId);
							if (headingSlug && openPanel) scrollToHeading(openPanel, headingSlug);
						} else {
							// Wrap in setTimeout to ensure it runs after current call stack.
							// Pass segParams through so ;diff= (and any future per-note param)
							// carried on the link reaches addPanel.
							setTimeout(() => {
								addPanel(type, value, panel, headingSlug, segParams);
							}, 0);
						}
					}
				});
			});

			// Add click handler for close button
			const closeBtn = panel.querySelector('.close-button');
			if (closeBtn) {
				closeBtn.addEventListener('click', async () => {
					const panelToRemove = panel; // This is the specific panel that was clicked
					// Use the full identity key stored at creation (covers ;diff= panels).
					const panelId = panelToRemove.dataset.panelId;

					await new Promise(resolve => {
						const handleTransitionEnd = (e) => {
							if (e.target === panelToRemove) {
								panelToRemove.removeEventListener('transitionend', handleTransitionEnd);
								loadedPanels.delete(panelId);
								panelToRemove.remove();
								resolve();
							}
						};

						panelToRemove.addEventListener('transitionend', handleTransitionEnd);
						
						// Trigger the animation
						requestAnimationFrame(() => {
							panelToRemove.classList.add('collapsing');
						});
					});

					// Update link highlighting and URL after panel is removed
					updateOpenedNoteLinks();
					updateURL();
				});
			}

			// Add click handler for permanent link
			panel.querySelectorAll('.permanent-link').forEach(link => {
				link.addEventListener('click', async (e) => {
					e.preventDefault();

					const permalink = `${window.location.origin}${window.location.pathname}${link.dataset.permalink}`;

					try {
						await navigator.clipboard.writeText(permalink);
						showToast('Permanent link copied to clipboard');
					} catch (err) {
						showToast('Failed to copy link to clipboard');
						console.error('Failed to copy:', err);
					}
				});
			});

			// Comment thread (per-panel; keyed on this panel's note). Runs after the
			// a[href^="#"] cloneNode pass above so its own handlers are not stripped.
			// Fire-and-forget: comments load asynchronously and reveal the region.
			// Skipped for error and diff panels (a diff has no .comments region and is
			// not a commentable note).
			if (!isError && !noteData.diffHtml) initComments(panel, noteData);

			return panel;
		}

		// ====================================================================
		// Commenting client (PR-5). Per-panel, keyed on panel.dataset.uid.
		// Reads are open CDN-cached GETs of /comments/{uid}.json (404 = none yet);
		// writes go to /api/comments behind the cookie authorizer. Comment bodies
		// are raw Markdown rendered through a hardened safe-subset renderer below.
		// ====================================================================

		function cpnConfig() {
			return (window.__CPN_CONFIG__ || {});
		}
		function commentsEnabled() {
			return !!cpnConfig().commentsEnabled;
		}

		// --- Hardened safe-subset Markdown renderer -------------------------
		// Comment bodies are attacker-controlled and served from a world-readable
		// cached file, so this is the sole XSS boundary. Strategy: escape ALL HTML
		// first, then re-introduce a tiny whitelist of inline constructs. No raw
		// HTML passthrough; links are restricted to http/https/mailto.
		function escapeHtml(s) {
			return s
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;');
		}
		function safeLinkHref(url) {
			const u = String(url).trim();
			if (/^(https?:|mailto:)/i.test(u)) return u;
			return null;
		}
		function renderInline(text) {
			// Operates on already-escaped text. Order: code spans first (so their
			// contents are not further interpreted), then wikilinks, links, bold,
			// italic.
			let out = text.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
			// Wikilink note-links: [[UID]] where UID is a Crockford Base32 token
			// (digits + uppercase A–Z minus I/L/O/U). Persisted as the UID (not the
			// title) so links survive renames; resolved to the note's CURRENT title
			// at render time via noteTitleMap. Runs before the markdown-link and
			// emphasis rules: [[…]] can't match the ](  link syntax, and UIDs carry
			// no _/* so they never collide with emphasis — ordering is defensive.
			// Length is not pinned ({6,}) because uidLength is author-configurable
			// (default 8); the floor limits false hits on ordinary all-caps text.
			// A resolved UID becomes an in-site note anchor (#/u{uid}, routed by the
			// delegated handler in initComments); an unknown UID degrades to inert,
			// greyed-out text via the shared .unpublished-link style. Tokens that
			// don't match the strict UID shape (e.g. [[Some Title]], [[&lt;script&gt;]])
			// are left untouched and stay escaped.
			out = out.replace(/\[\[([0-9A-HJKMNP-TV-Z]{6,})\]\]/g, (m, uid) => {
				const title = noteTitleMap.get(uid);
				if (title) {
					return `<a href="#/u${uid}" class="comment-wikilink">${escapeHtml(title)}</a>`;
				}
				return `<span class="unpublished-link">[[${uid}]]</span>`;
			});
			out = out.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, label, url) => {
				// url here is escaped; decode the few entities we produced to test the protocol.
				const decoded = url.replace(/&amp;/g, '&').replace(/&#39;/g, "'").replace(/&quot;/g, '"');
				const href = safeLinkHref(decoded);
				if (!href) return label;
				return `<a href="${escapeHtml(href)}" rel="nofollow noopener noreferrer" target="_blank">${label}</a>`;
			});
			out = out.replace(/\*\*([^*]+)\*\*/g, (_, c) => `<strong>${c}</strong>`);
			out = out.replace(/(^|[^*])\*([^*]+)\*/g, (_, pre, c) => `${pre}<em>${c}</em>`);
			// Underscore emphasis. Unlike asterisks, underscores use CommonMark's
			// intraword rule: `_` counts as a word char in the boundary guards, so
			// snake_case / foo_bar_baz / variable_name stay literal. Double before
			// single so `__x__` isn't half-eaten by the italic rule.
			// KNOWN LIMITATION (shared with the asterisk rules above): emphasis runs
			// after the link rule, so an emitted <a href="…"> whose URL contains `_`
			// adjacent to =?&/ can be corrupted (e.g. …=<em>foo</em>&…). This is a
			// correctness bug, NOT XSS — the <em> sits inside a quoted, escapeHtml'd
			// attribute value and executes nothing. A real fix (tokenize link vs text
			// spans) is a follow-up; underscores in path segments (/foo_bar/) are
			// guarded on both sides and unaffected.
			out = out.replace(/(^|[^A-Za-z0-9_])__([^_\s](?:[^_]*[^_\s])?)__(?![A-Za-z0-9_])/g, (m, pre, c) => `${pre}<strong>${c}</strong>`);
			out = out.replace(/(^|[^A-Za-z0-9_])_([^_\s](?:[^_]*[^_\s])?)_(?![A-Za-z0-9_])/g, (m, pre, c) => `${pre}<em>${c}</em>`);
			return out;
		}
		function renderMarkdown(md) {
			const escaped = escapeHtml(String(md == null ? '' : md));
			// Block-level: split on blank lines into paragraphs; preserve single
			// newlines as <br>. Lists are kept simple (one level).
			const blocks = escaped.split(/\n{2,}/);
			return blocks.map(block => {
				const lines = block.split('\n');
				const isList = lines.every(l => /^\s*[-*]\s+/.test(l)) && lines.length > 0;
				if (isList) {
					const items = lines.map(l => `<li>${renderInline(l.replace(/^\s*[-*]\s+/, ''))}</li>`).join('');
					return `<ul>${items}</ul>`;
				}
				return `<p>${renderInline(lines.join('\n')).replace(/\n/g, '<br>')}</p>`;
			}).join('');
		}

		// --- Data fetch ------------------------------------------------------
		async function loadComments(noteUid) {
			const base = cpnConfig().commentReadPath || '/comments/';
			try {
				const res = await fetch(`${base}${encodeURIComponent(noteUid)}.json`, { credentials: 'same-origin' });
				// "No comments yet" is the common case for a fresh note. Under
				// CloudFront + S3 OAC (GetObject only, no ListBucket) a missing object
				// returns 403 AccessDenied, NOT 404 — same as the note-load path
				// (loadNote treats 403/404 alike). Treat both as an empty thread so the
				// (empty) composer still renders; only genuine transport failures
				// (offline/DNS/CORS, which reject the fetch) should suppress the widget.
				if (res.status === 404 || res.status === 403) return { version: 1, comments: [] };
				if (!res.ok) throw new Error(`HTTP ${res.status}`);
				const data = await res.json();
				return data && Array.isArray(data.comments) ? data : { version: 1, comments: [] };
			} catch (err) {
				console.error('Error loading comments:', err);
				return null;
			}
		}

		// Whoami: does the reader have comment access, and have they picked a
		// username yet? The cpn_id session cookie is HttpOnly (JS can't read it),
		// so this authenticated round-trip is the only client-visible auth signal.
		// Returns { authenticated: false } for signed-out readers (401/403), or
		// { authenticated: true, username: <string|null> } when signed in.
		async function fetchMe() {
			const path = cpnConfig().commentMePath || '/api/me';
			try {
				const res = await fetch(path, { credentials: 'same-origin' });
				if (res.status === 401 || res.status === 403) return { authenticated: false };
				if (!res.ok) return { authenticated: false };
				const data = await res.json();
				return { authenticated: true, username: (data && data.username) || null };
			} catch (err) {
				return { authenticated: false };
			}
		}

		// Claim a unique, permanent username. Resolves to { ok:true, username } or
		// { ok:false, error } (400 invalid format, 409 taken/already-set).
		async function postUsername(username) {
			const path = cpnConfig().commentMePath || '/api/me';
			const res = await fetch(path, {
				method: 'POST',
				credentials: 'same-origin',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ username }),
			});
			let data = {};
			try { data = await res.json(); } catch (e) { /* ignore */ }
			if (res.ok) return { ok: true, username: data.username || username };
			return { ok: false, error: (data && data.error) || `HTTP ${res.status}` };
		}

		function hostedUiLoginUrl() {
			const cfg = cpnConfig();
			if (!cfg.authLoginUrl) return null;
			// Return to the current full URL after sign-in.
			const state = encodeURIComponent(window.location.pathname + window.location.search + window.location.hash);
			const sep = cfg.authLoginUrl.indexOf('?') > -1 ? '&' : '?';
			return `${cfg.authLoginUrl}${sep}state=${state}`;
		}

		// --- Rendering -------------------------------------------------------
		// Build a chronological thread (replies nested one level under parents).
		function buildThread(comments) {
			const byParent = new Map();
			for (const c of comments) {
				const key = c.parentCommentUid || '__root__';
				if (!byParent.has(key)) byParent.set(key, []);
				byParent.get(key).push(c);
			}
			return byParent;
		}

		// Render a single comment. `ctx` (optional) = { currentUsername, noteUid,
		// noteHash, refresh }; when the comment is owned by the current reader it
		// grows an Edit/Delete action row. `opts` (optional) = { canReply }: when
		// set AND the reader is signed in, an active (non-deleted) comment grows a
		// Reply affordance. `canReply` is passed only for ROOT comments, so a reply
		// never itself sprouts a Reply button — that caps threads at one level.
		// Called with no ctx/opts (e.g. in tests) it renders a read-only comment
		// with no affordances.
		function renderComment(c, ctx, opts) {
			const el = document.createElement('div');
			el.className = 'comment-item';
			el.dataset.commentUid = c.commentUid;
			if (c.status === 'deleted') {
				el.classList.add('comment-deleted');
				el.innerHTML = `<div class="comment-body"><em>[comment deleted]</em></div>`;
				return el;
			}
			const when = c.createdAt ? new Date(c.createdAt * 1000).toLocaleString() : '';
			const author = c.authorName ? '@' + c.authorName : 'anonymous';
			// POST sets updatedAt === createdAt, so a strict > means a real edit.
			const editedBadge = (c.updatedAt && c.createdAt && c.updatedAt > c.createdAt)
				? '<span class="comment-edited">(edited)</span>' : '';
			el.innerHTML = `
				<div class="comment-meta"><span class="comment-author">${escapeHtml(author)}</span><span class="comment-when">${escapeHtml(when)}</span>${editedBadge}</div>
				<div class="comment-body">${renderMarkdown(c.body)}</div>
			`;

			// Owner-only edit/delete. This is a DISPLAY gate only: usernames are
			// unique + immutable (1:1 with the Cognito sub), so matching the
			// denormalized authorName against the reader's own username is a sound
			// proxy for ownership. The server re-checks the sub on every write, so a
			// mis-fired gate can only ever produce a 403 — never an unauthorized edit.
			const owned = !!(ctx && ctx.currentUsername && c.authorName === ctx.currentUsername);
			if (owned) attachOwnerActions(el, c, ctx);
			// Reply is NOT owner-gated (any signed-in reader may reply) and lives in
			// its own element, so it never disturbs the owner-only .comment-actions row.
			if (opts && opts.canReply && ctx && ctx.currentUsername && c.status !== 'deleted') {
				attachReplyAction(el, c, ctx);
			}
			return el;
		}

		// Append an Edit/Delete action row to an owned comment element and wire up
		// the inline edit form + delete flow. Built with createElement (not an
		// innerHTML string) so the click listeners survive.
		function attachOwnerActions(el, c, ctx) {
			const body = el.querySelector('.comment-body');
			const actions = document.createElement('div');
			actions.className = 'comment-actions';
			const editBtn = document.createElement('button');
			editBtn.type = 'button';
			editBtn.className = 'comment-action';
			editBtn.textContent = 'Edit';
			const delBtn = document.createElement('button');
			delBtn.type = 'button';
			delBtn.className = 'comment-action';
			delBtn.textContent = 'Delete';
			const status = document.createElement('span');
			status.className = 'comment-status';
			actions.appendChild(editBtn);
			actions.appendChild(delBtn);
			actions.appendChild(status);
			el.appendChild(actions);

			editBtn.addEventListener('click', () => {
				actions.hidden = true;
				body.hidden = true;
				const form = document.createElement('div');
				form.className = 'comment-edit-form';
				// Prefill with the RAW Markdown; existing [[UID]] tokens deserialize
				// into chips (title shown) and stay editable.
				const editor = buildCommentEditor(c.body || '', '');
				attachWikilinkAutocomplete(editor);
				const save = document.createElement('button');
				save.type = 'button';
				save.className = 'comment-submit';
				save.textContent = 'Save';
				const cancel = document.createElement('button');
				cancel.type = 'button';
				cancel.className = 'comment-action';
				cancel.textContent = 'Cancel';
				const editStatus = document.createElement('span');
				editStatus.className = 'comment-status';
				form.appendChild(editor.el);
				form.appendChild(save);
				form.appendChild(cancel);
				form.appendChild(editStatus);
				el.insertBefore(form, actions);

				const closeForm = () => {
					form.remove();
					body.hidden = false;
					actions.hidden = false;
				};
				cancel.addEventListener('click', closeForm);
				save.addEventListener('click', async () => {
					const next = editor.getValue().trim();
					if (!next) return;
					save.disabled = true;
					editStatus.textContent = 'Saving…';
					try {
						await patchComment(c.commentUid, ctx.noteUid, c.createdAt, next);
						// Optimistic local update through the same XSS boundary.
						c.body = next;
						body.innerHTML = renderMarkdown(next);
						if (!el.querySelector('.comment-edited')) {
							const meta = el.querySelector('.comment-meta');
							if (meta) {
								const badge = document.createElement('span');
								badge.className = 'comment-edited';
								badge.textContent = '(edited)';
								meta.appendChild(badge);
							}
						}
						closeForm();
						if (ctx.refresh) setTimeout(ctx.refresh, 1500);
					} catch (err) {
						editStatus.textContent = err.message === 'auth'
							? 'Your session expired — please sign in again.'
							: 'Could not save changes.';
						save.disabled = false;
					}
				});
			});

			delBtn.addEventListener('click', async () => {
				if (!window.confirm('Delete this comment?')) return;
				delBtn.disabled = true;
				editBtn.disabled = true;
				status.textContent = 'Deleting…';
				try {
					await deleteComment(c.commentUid, ctx.noteUid, c.createdAt);
					// Optimistically show the deleted state. If this comment has rendered
					// replies, keep it as a tombstone so the thread structure survives;
					// otherwise remove it outright.
					const replies = el.querySelector('.comment-replies');
					if (replies) {
						el.classList.add('comment-deleted');
