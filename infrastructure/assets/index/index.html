						body.innerHTML = '<em>[comment deleted]</em>';
						actions.remove();
					} else {
						el.remove();
					}
					if (ctx.refresh) setTimeout(ctx.refresh, 1500);
				} catch (err) {
					status.textContent = err.message === 'auth'
						? 'Your session expired — please sign in again.'
						: 'Could not delete comment.';
					delBtn.disabled = false;
					editBtn.disabled = false;
				}
			});
		}

		// Append a Reply affordance to a root comment: a "Reply" button that swaps
		// itself for an inline compose form. Built with createElement (not an
		// innerHTML string) so listeners survive, mirroring attachOwnerActions and
		// the inline edit form. The reply is posted with parentCommentUid set to the
		// root's commentUid; the same 1500ms optimistic refresh as the main composer
		// then pulls the freshly-nested reply back into view.
		function attachReplyAction(el, rootComment, ctx) {
			const row = document.createElement('div');
			row.className = 'comment-reply-row';
			const replyBtn = document.createElement('button');
			replyBtn.type = 'button';
			replyBtn.className = 'comment-reply-btn';
			replyBtn.textContent = 'Reply';
			row.appendChild(replyBtn);
			el.appendChild(row);

			replyBtn.addEventListener('click', () => {
				row.hidden = true;
				const form = document.createElement('div');
				form.className = 'comment-reply-form';
				const editor = buildCommentEditor('', 'Write a reply (Markdown supported)…');
				attachWikilinkAutocomplete(editor);
				const submit = document.createElement('button');
				submit.type = 'button';
				submit.className = 'comment-submit';
				submit.textContent = 'Reply';
				const cancel = document.createElement('button');
				cancel.type = 'button';
				cancel.className = 'comment-action';
				cancel.textContent = 'Cancel';
				const status = document.createElement('span');
				status.className = 'comment-status';
				form.appendChild(editor.el);
				form.appendChild(submit);
				form.appendChild(cancel);
				form.appendChild(status);
				el.appendChild(form);

				const closeForm = () => {
					form.remove();
					row.hidden = false;
				};
				cancel.addEventListener('click', closeForm);
				submit.addEventListener('click', async () => {
					const body = editor.getValue().trim();
					if (!body) return;
					submit.disabled = true;
					status.textContent = 'Posting…';
					try {
						await postComment(ctx.noteUid, ctx.noteHash || '', body, rootComment.commentUid);
						status.textContent = 'Posted. It may take a moment to appear.';
						if (ctx.refresh) setTimeout(ctx.refresh, 1500);
					} catch (err) {
						status.textContent = err.message === 'auth'
							? 'Your session expired — please sign in again.'
							: 'Could not post reply.';
						submit.disabled = false;
					}
				});
			});
		}

		function renderThreadInto(container, comments, ctx) {
			const byParent = buildThread(comments);
			const list = container.querySelector('.comment-list');
			list.innerHTML = '';
			const roots = byParent.get('__root__') || [];
			let rendered = 0;
			for (const root of roots) {
				const replies = byParent.get(root.commentUid) || [];
				// A deleted root with no replies is dropped entirely; kept as a
				// tombstone only when replies still hang off it (preserves threading).
				if (root.status === 'deleted' && !replies.length) continue;
				// Only roots opt into a Reply button; replies do not, which caps the
				// thread at one level even though the backend could store deeper chains.
				const item = renderComment(root, ctx, { canReply: true });
				if (replies.length) {
					const repliesEl = document.createElement('div');
					repliesEl.className = 'comment-replies';
					for (const r of replies) repliesEl.appendChild(renderComment(r, ctx));
					item.appendChild(repliesEl);
				}
				list.appendChild(item);
				rendered++;
			}
			if (!rendered) {
				list.innerHTML = '<p class="comment-empty">No comments yet.</p>';
			}
		}

		// --- Compose / write -------------------------------------------------
		// `parentCommentUid` (optional) turns a top-level comment into a reply. It
		// is only added to the payload when supplied, so top-level posts are
		// unchanged. The write Lambda persists it verbatim (see comment-write.js),
		// and the renderer nests replies one level under their parent.
		async function postComment(noteUid, noteHash, body, parentCommentUid) {
			const base = cpnConfig().commentWritePath || '/api/comments';
			const payload = { noteUid, noteHash, body };
			if (parentCommentUid) payload.parentCommentUid = parentCommentUid;
			const res = await fetch(base, {
				method: 'POST',
				credentials: 'same-origin',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(payload),
			});
			if (res.status === 401 || res.status === 403) {
				throw new Error('auth');
			}
			if (!res.ok) throw new Error(`HTTP ${res.status}`);
			return res.json();
		}

		// Edit / delete a comment. Both target /api/comments behind the cookie
		// authorizer; ownership is enforced SERVER-SIDE (the write Lambda checks the
		// stored authorId against the caller's Cognito sub), so the client gate is
		// display-only and a spoofed request can only ever earn a 403. The backend
		// reconstructs the DynamoDB key as COMMENT#<createdAt>#<commentUid>, so
		// createdAt must be passed through verbatim from the loaded comment (it is an
		// integer of unix seconds — never recompute it client-side).
		async function patchComment(commentUid, noteUid, createdAt, body) {
			const base = cpnConfig().commentWritePath || '/api/comments';
			const res = await fetch(base, {
				method: 'PATCH',
				credentials: 'same-origin',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ commentUid, noteUid, createdAt, body }),
			});
			if (res.status === 401 || res.status === 403) throw new Error('auth');
			if (!res.ok) throw new Error(`HTTP ${res.status}`);
			return res.json();
		}
		async function deleteComment(commentUid, noteUid, createdAt) {
			const base = cpnConfig().commentWritePath || '/api/comments';
			// A JSON body on DELETE is intentional: this hits the API Gateway origin
			// (not the S3/CDN comment cache), and the write Lambda parses event.body.
			const res = await fetch(base, {
				method: 'DELETE',
				credentials: 'same-origin',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ commentUid, noteUid, createdAt }),
			});
			if (res.status === 401 || res.status === 403) throw new Error('auth');
			if (!res.ok) throw new Error(`HTTP ${res.status}`);
			return res.json();
		}

		// Render the "Sign in to comment" affordance into a composer container.
		function showSignIn(composer) {
			composer.innerHTML = '';
			const login = hostedUiLoginUrl();
			if (login) {
				const a = document.createElement('a');
				a.className = 'comment-signin';
				a.href = login;
				a.textContent = 'Sign in to comment';
				composer.appendChild(a);
			} else {
				composer.textContent = 'Sign-in is not configured for this site.';
			}
		}

		// One-time username-setup step for a signed-in reader who hasn't chosen a
		// handle yet. On success it rebuilds the composer as an enabled compose box.
		function buildUsernameSetup(panel, noteData, region, refresh) {
			const composer = region.querySelector('.comment-composer');
			composer.innerHTML = '';
			const wrap = document.createElement('div');
			wrap.className = 'comment-username-setup';
			const label = document.createElement('label');
			label.className = 'comment-username-label';
			label.textContent = 'Choose a username to comment (3–20 letters, digits or underscore). This is permanent.';
			const input = document.createElement('input');
			input.className = 'comment-username-input';
			input.type = 'text';
			input.maxLength = 20;
			input.placeholder = 'username';
			const save = document.createElement('button');
			save.className = 'comment-submit';
			save.textContent = 'Choose username';
			const error = document.createElement('span');
			error.className = 'comment-username-error';

			save.addEventListener('click', async () => {
				error.textContent = '';
				const name = input.value.trim();
				if (!name) return;
				save.disabled = true;
				try {
					const result = await postUsername(name);
					if (result.ok) {
						buildComposer(panel, noteData, region, refresh, { authenticated: true, username: result.username });
					} else {
						error.textContent = result.error;
					}
				} catch (err) {
					error.textContent = 'Could not set username.';
				} finally {
					save.disabled = false;
				}
			});

			wrap.appendChild(label);
			wrap.appendChild(input);
			wrap.appendChild(save);
			wrap.appendChild(error);
			composer.appendChild(wrap);
		}

		// A committed [[UID]] note-link, shown in the editor as an atomic pill that
		// displays the note's TITLE while carrying its UID in data-uid. Marked
		// contenteditable=false so the browser treats it as one unit — a single
		// Backspace deletes the whole link. The link glyph is a CSS ::before, so
		// textContent holds only the title (set via textContent — never innerHTML).
		function makeChip(uid, title) {
			const chip = document.createElement('span');
			chip.className = 'comment-chip';
			chip.setAttribute('contenteditable', 'false');
			chip.dataset.uid = uid;
			chip.textContent = title;
			return chip;
		}

		// Serialize a comment editor's DOM back into the Markdown string that is
		// posted/stored: text nodes contribute their text, chips contribute
		// [[UID]], and block/BR boundaries contribute newlines. This must match the
		// exact string the old <textarea> produced so nothing downstream changes.
		// Zero-width caret-safety spaces (​) are stripped.
		function serializeCommentDom(root) {
			let out = '';
			root.childNodes.forEach(node => {
				if (node.nodeType === 3) { // text
					out += node.nodeValue;
					return;
				}
				if (node.nodeType !== 1) return; // ignore comments etc.
				if (node.classList && node.classList.contains('comment-chip') && node.dataset.uid) {
					out += '[[' + node.dataset.uid + ']]';
					return;
				}
				const tag = node.tagName;
				if (tag === 'BR') { out += '\n'; return; }
				if (tag === 'DIV' || tag === 'P') {
					// contenteditable wraps new lines in blocks; treat each as a
					// newline boundary. An empty block (<div><br></div>) is one \n.
					if (out.length && !out.endsWith('\n')) out += '\n';
					if (!(node.childNodes.length === 1 && node.firstChild.tagName === 'BR')) {
						out += serializeCommentDom(node);
					}
					return;
				}
				out += serializeCommentDom(node); // inline wrapper
			});
			return out.replace(/​/g, '');
		}

		// Build a contenteditable comment input with a textarea-like API. Selecting
		// a note from the [[ ]] autocomplete inserts a chip (title shown), but
		// getValue() serializes back to [[UID]] so storage + rendering are
		// unchanged. Returns { el, getValue, setValue, clear, focus }.
		function buildCommentEditor(initialMarkdown, placeholder) {
			const el = document.createElement('div');
			el.className = 'comment-input';
			el.setAttribute('contenteditable', 'true');
			el.setAttribute('role', 'textbox');
			el.setAttribute('aria-multiline', 'true');
			if (placeholder) el.dataset.placeholder = placeholder;

			// Deserialize [[UID]] Markdown into text + chip nodes. A UID missing from
			// the index still becomes a chip labeled with the raw UID (stable
			// round-trip; matches the greyed-out render fallback).
			const setValue = (markdown) => {
				el.innerHTML = '';
				const md = markdown || '';
				const re = /\[\[([0-9A-HJKMNP-TV-Z]{6,})\]\]/g;
				let last = 0;
				let m;
				while ((m = re.exec(md))) {
					if (m.index > last) el.appendChild(document.createTextNode(md.slice(last, m.index)));
					const uid = m[1];
					el.appendChild(makeChip(uid, noteTitleMap.get(uid) || uid));
					last = m.index + m[0].length;
				}
				if (last < md.length) el.appendChild(document.createTextNode(md.slice(last)));
			};

			const getValue = () => serializeCommentDom(el);
			const clear = () => { el.innerHTML = ''; };
			const focus = () => {
				el.focus();
				const range = document.createRange();
				range.selectNodeContents(el);
				range.collapse(false);
				const sel = window.getSelection();
				if (sel) { sel.removeAllRanges(); sel.addRange(range); }
			};

			// Paste as plain text only, so rich clipboard HTML can't inject arbitrary
			// nodes into the editor (keeps serialization predictable; embedded \n
			// render via white-space: pre-wrap, same as setValue).
			el.addEventListener('paste', (e) => {
				e.preventDefault();
				const cd = e.clipboardData || window.clipboardData;
				const text = cd ? cd.getData('text/plain') : '';
				const sel = window.getSelection();
				if (!sel || !sel.rangeCount) return;
				const range = sel.getRangeAt(0);
				range.deleteContents();
				const tn = document.createTextNode(text);
				range.insertNode(tn);
				range.setStartAfter(tn);
				range.collapse(true);
				sel.removeAllRanges();
				sel.addRange(range);
			});

			if (initialMarkdown) setValue(initialMarkdown);
			return { el, getValue, setValue, clear, focus };
		}

		// Obsidian-style [[ ]] note-link autocomplete for a comment editor (the
		// object from buildCommentEditor). Applied to the composer, reply, and edit
		// editors so all three behave consistently. Detects an open `[[query` token
		// left of the caret within a text node, filters noteTitleList by
		// case-insensitive title substring, and on selection replaces the token with
		// a chip (title shown, [[UID]] stored). No-ops entirely when noteTitleList is
		// empty (content index not published). Menu anchors to the editor's
		// bottom-left (the form containers are position:relative).
		function attachWikilinkAutocomplete(editor) {
			if (!noteTitleList.length) return; // no note index -> no autocomplete
			const el = editor.el;
			// An unclosed [[ with no closing ]] or newline after it, anchored to the
			// end of the text-node content before the caret.
			const OPEN_TOKEN = /\[\[([^\]\n]*)$/;

			let menu = null;       // dropdown element, or null when closed
			let items = [];        // current [{ uid, title }] shown
			let active = -1;       // highlighted index within items
			let tokenNode = null;  // the text node holding the open [[query
			let tokenStart = -1;   // index of '[[' within tokenNode
			let tokenEnd = -1;     // caret index within tokenNode

			const closeMenu = () => {
				if (menu) { menu.remove(); menu = null; }
				items = [];
				active = -1;
				tokenNode = null;
				tokenStart = -1;
				tokenEnd = -1;
			};

			const renderMenu = () => {
				if (!menu) {
					menu = document.createElement('div');
					menu.className = 'comment-wikilink-menu';
					const parent = el.parentNode;
					if (parent) parent.appendChild(menu);
					menu.style.top = (el.offsetTop + el.offsetHeight) + 'px';
					menu.style.left = el.offsetLeft + 'px';
					menu.style.minWidth = el.offsetWidth + 'px';
				}
				menu.innerHTML = '';
				items.forEach((it, i) => {
					const row = document.createElement('div');
					row.className = 'comment-wikilink-menu-item' + (i === active ? ' active' : '');
					row.textContent = it.title;
					// mousedown (not click) so it fires before the editor blur.
					row.addEventListener('mousedown', (e) => {
						e.preventDefault();
						commit(i);
					});
					menu.appendChild(row);
				});
			};

			const commit = (i) => {
				const it = items[i];
				if (!it || !tokenNode) return;
				const full = tokenNode.nodeValue;
				const before = full.slice(0, tokenStart);
				const after = full.slice(tokenEnd);
				const parent = tokenNode.parentNode;
				if (!parent) { closeMenu(); return; }
				// tokenNode keeps the text before '[['; a chip + trailing text node
				// (the text after the caret, or a zero-width space so the caret can
				// land after the chip) follow it.
				tokenNode.nodeValue = before;
				const afterNode = document.createTextNode(after.length ? after : '​');
				const chip = makeChip(it.uid, it.title);
				parent.insertBefore(afterNode, tokenNode.nextSibling);
				parent.insertBefore(chip, afterNode);
				const range = document.createRange();
				range.setStart(afterNode, 0);
				range.collapse(true);
				const sel = window.getSelection();
				if (sel) { sel.removeAllRanges(); sel.addRange(range); }
				el.focus();
				closeMenu();
			};

			const update = () => {
				const sel = window.getSelection();
				if (!sel || !sel.rangeCount) { closeMenu(); return; }
				const range = sel.getRangeAt(0);
				const node = range.startContainer;
				// The query only ever lives in a plain text node inside the editor
				// (chips are separate non-editable nodes).
				if (node.nodeType !== 3 || !el.contains(node)) { closeMenu(); return; }
				const offset = range.startOffset;
				const m = OPEN_TOKEN.exec(node.nodeValue.slice(0, offset));
				if (!m) { closeMenu(); return; }
				tokenNode = node;
				tokenStart = m.index;
				tokenEnd = offset;
				const query = m[1].toLowerCase();
				items = noteTitleList
					.filter(it => it.title.toLowerCase().includes(query))
					.slice(0, 8);
				if (!items.length) { closeMenu(); return; }
				active = 0;
				renderMenu();
			};

			el.addEventListener('input', update);
			// Keep the menu in sync when the caret moves without editing (arrows,
			// clicks) so a stale menu doesn't linger over a closed token.
			el.addEventListener('click', update);

			el.addEventListener('keydown', (e) => {
				if (!menu) return;
				if (e.key === 'ArrowDown') {
					e.preventDefault();
					active = (active + 1) % items.length;
					renderMenu();
				} else if (e.key === 'ArrowUp') {
					e.preventDefault();
					active = (active - 1 + items.length) % items.length;
					renderMenu();
				} else if (e.key === 'Enter' || e.key === 'Tab') {
					e.preventDefault();
					commit(active);
				} else if (e.key === 'Escape') {
					e.preventDefault();
					closeMenu();
				}
			});

			// Close on blur (deferred so a menu mousedown can commit first).
			el.addEventListener('blur', () => { setTimeout(closeMenu, 100); });
		}

		// Render the compose box. `auth` is { authenticated, username }: a
		// signed-out reader gets a DISABLED textarea plus the sign-in link, so the
		// input is never typeable without comment access. Signed-in-with-username
		// readers get the working composer.
		function buildComposer(panel, noteData, region, refresh, auth) {
			const composer = region.querySelector('.comment-composer');
			composer.innerHTML = '';
			const signedIn = !!(auth && auth.authenticated && auth.username);

			if (!signedIn) {
				// Disabled preview textarea above the sign-in affordance.
				const preview = document.createElement('textarea');
				preview.className = 'comment-input';
				preview.placeholder = 'Sign in to add a comment';
				preview.disabled = true;
				composer.appendChild(preview);
				const signinWrap = document.createElement('div');
				composer.appendChild(signinWrap);
				showSignIn(signinWrap);
				return;
			}

			const editor = buildCommentEditor('', 'Add a comment (Markdown supported)…');
			attachWikilinkAutocomplete(editor);
			const submit = document.createElement('button');
			submit.className = 'comment-submit';
			submit.textContent = 'Comment';
			const status = document.createElement('span');
			status.className = 'comment-status';

			submit.addEventListener('click', async () => {
				const body = editor.getValue().trim();
				if (!body) return;
				submit.disabled = true;
				status.textContent = 'Posting…';
				try {
					await postComment(panel.dataset.uid, noteData.hash || '', body);
					editor.clear();
					status.textContent = 'Posted. It may take a moment to appear.';
					setTimeout(refresh, 1500);
				} catch (err) {
					if (err.message === 'auth') {
						// Session expired since load — fall back to the sign-in affordance.
						showSignIn(composer);
					} else {
						status.textContent = 'Could not post comment.';
					}
				} finally {
					submit.disabled = false;
				}
			});

			composer.appendChild(editor.el);
			composer.appendChild(submit);
			composer.appendChild(status);
		}

		// --- Entry point (called from createPanel per panel) -----------------
		async function initComments(panel, noteData) {
			// config.json loads asynchronously (see CONFIG_BOOTSTRAP); await it so a
			// slow config fetch can't make commentsEnabled() read false and silently
			// skip the widget until a reload.
			if (window.__CPN_CONFIG_READY__) await window.__CPN_CONFIG_READY__;
			if (!commentsEnabled()) return;
			const region = panel.querySelector('.comments');
			if (!region) return;
			const noteUid = panel.dataset.uid;
			if (!noteUid) return;

			region.innerHTML = `
				<h3 class="comments-heading">Comments</h3>
				<div class="comment-list"></div>
				<div class="comment-composer"></div>
			`;

			// Delegated click handler for [[UID]] note-links inside comment bodies.
			// The per-note-body handler (see createPanel) only wires links present at
			// note-render time; comment bodies render later and on every refresh, so
			// their anchors need routing here. Bound once to the stable region so it
			// survives renderThreadInto's innerHTML swaps. Mirrors the note-body
			// handler's parse -> panelKey -> scroll-or-addPanel logic.
			region.addEventListener('click', (e) => {
				const a = e.target.closest('a.comment-wikilink');
				if (!a || !region.contains(a)) return;
				e.preventDefault();
				const parsed = parseURLFragment(a.getAttribute('href').slice(1));
				if (!parsed.length) return;
				const { type, value, params: segParams } = parsed[0];
				const id = panelKey(type, value, segParams);
				if (loadedPanels.has(id)) {
					scrollToPanel(id);
				} else {
					setTimeout(() => addPanel(type, value, panel, null, segParams), 0);
				}
			});

			// Shared, mutable render context. `refresh` closes over it, so once the
			// reader's identity is known (below) every later re-render — including
			// the ones triggered after posting/editing/deleting — keeps the
			// owner Edit/Delete affordances. `lastComments` caches the most recent
			// thread so the note-index-load re-render (below) can repaint resolved
			// [[UID]] titles without a second fetch.
			const ctx = { currentUsername: null, noteUid: noteUid, noteHash: noteData.hash || '', refresh: null, lastComments: [] };
			const refresh = async () => {
				const data = await loadComments(noteUid);
				if (data) {
					ctx.lastComments = data.comments;
					renderThreadInto(region, data.comments, ctx);
				}
			};
			ctx.refresh = refresh;

			// Ensure the note-title index is loaded so [[UID]] wikilinks in comment
			// bodies resolve to titles. Idempotent + memoized, so this shares the
			// header-search fetch. If it lands after the first paint, repaint the
			// cached thread so greyed-out placeholders become resolved links.
			loadNoteIndexOnce().then(idx => {
				if (idx && ctx.lastComments.length) renderThreadInto(region, ctx.lastComments, ctx);
			});

			const data = await loadComments(noteUid);
			if (data === null) return; // network error — leave the region hidden
			region.hidden = false;
			ctx.lastComments = data.comments;
			// First paint without owner buttons — don't block on fetchMe so the
			// thread appears as fast as before.
			renderThreadInto(region, data.comments, ctx);

			// Gate the composer on the reader's auth/identity state:
			//   signed out            -> disabled box + "Sign in to comment"
			//   signed in, no username -> one-time username-setup step
			//   signed in, has username -> working composer
			const auth = await fetchMe();
			ctx.currentUsername = (auth.authenticated && auth.username) ? auth.username : null;
			// Re-render with the identity known so owned comments grow Edit/Delete
			// (reuses the already-loaded data — no extra network round-trip).
			if (ctx.currentUsername) renderThreadInto(region, data.comments, ctx);
			if (auth.authenticated && !auth.username) {
				buildUsernameSetup(panel, noteData, region, refresh);
			} else {
				buildComposer(panel, noteData, region, refresh, auth);
			}
		}

		// Build the side-by-side diff HTML for a note against a ;diff= mini-target.
		// Orientation is git-style old→new: the diff target is the OLD (left) side
		// and the base note is the NEW (right) side, so `#/uABC;diff=pHASH` reads as
		// "ABC compared against pHASH". Returns { html, leftHash, rightHash } on a
		// real diff, { empty: true } when the two versions are identical, or throws
		// on any failure (bad mini-target, unresolvable side, fetch error, no .raw)
		// so the caller can degrade to rendering the base note alone.
		async function buildDiff(baseNote, diffTarget) {
			const targetType = diffTarget.charAt(0);
			const targetValue = diffTarget.slice(1);
			const targetHash = await resolveHash(targetType, targetValue);

			const response = await fetch(`/notes/${targetHash}.json`);
			if (cpnAuthGate(response)) throw new Error('auth');
			if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
			const targetNote = await response.json();

			if (typeof targetNote.raw !== 'string' || typeof baseNote.raw !== 'string') {
				throw new Error('Note JSON is missing raw Markdown; cannot diff');
			}
			if (targetNote.raw === baseNote.raw) {
				return { empty: true };
			}

			const leftHash = targetHash;
			const rightHash = baseNote.hash;
			const patch = Diff.createTwoFilesPatch(
				`${leftHash}`, `${rightHash}`,
				targetNote.raw, baseNote.raw, '', ''
			);
			const html = Diff2Html.html(patch, {
				drawFileList: false,
				matching: 'words',
				outputFormat: 'side-by-side'
			});
			return { html, leftHash, rightHash };
		}

		// Resolve phase: fetch + build all the data a panel needs WITHOUT touching the
		// DOM or the URL. Never throws — a failure returns an object with `error: true`
		// so a single bad note can't reject a whole batch of concurrent resolves (see
		// loadPanelsFromURL's Promise.all fan-out). Returns:
		//   { paramType, paramValue, params, panelId, noteData }   on success
		//   { paramType, paramValue, params, panelId, error: true } on failure
		async function resolvePanelData(paramType, paramValue, params = null) {
			// Unique identifier for the panel. Folds in any ;diff= target so a diffed
			// view of a note is distinct from the plain note (see panelKey).
			const panelId = panelKey(paramType, paramValue, params);
			try {
				const noteData = await loadNoteByParameter(paramType, paramValue);
				if (!noteData) {
					throw new Error('Note not found');
				}

				// If a diff was requested, build it in its own try/catch so a bad or
				// unresolvable ;diff= degrades to the plain note rather than erroring
				// the whole panel. A successful diff stamps diffHtml/diffMeta onto
				// noteData; an empty (identical) or failed diff leaves a notice.
				if (params && params.diff) {
					try {
						const diff = await buildDiff(noteData, params.diff);
						if (diff.empty) {
							noteData.diffNotice = 'No differences between these two versions.';
						} else {
							noteData.diffHtml = diff.html;
							noteData.diffMeta = { left: diff.leftHash, right: diff.rightHash };
						}
					} catch (diffError) {
						console.error('Error building diff:', diffError);
						noteData.diffNotice = 'Could not render the requested diff; showing the note instead.';
					}
				}

				return { paramType, paramValue, params, panelId, noteData };
			} catch (error) {
				console.error('Error resolving panel:', error);
				return { paramType, paramValue, params, panelId, error: true };
			}
		}

		// Attach phase: synchronous DOM construction + insertion for one resolved panel.
		// Does NOT call updateOpenedNoteLinks/updateURL/scrollIntoView — the CALLER owns
		// those so a batch can run them once at the end (loadPanelsFromURL) while a
		// single click keeps its per-panel behavior (addPanel). Dedupe is enforced here
		// via loadedPanels so the same note appearing twice in one URL only inserts once.
		// Returns the inserted panel element, or null if it was a duplicate (skipped).
		function attachResolvedPanel(resolved, { afterPanel = null } = {}) {
			const { paramType, paramValue, params, panelId } = resolved;

			// Duplicate guard: a note already in the stack (same panelKey) is not
			// re-inserted. Returning null lets the caller detect the skip.
			if (loadedPanels.has(panelId)) {
				return null;
			}

			const container = document.getElementById('panels');
			const referenceNode = afterPanel ? afterPanel.nextElementSibling : null;

			if (resolved.error) {
				// Error panel: degrade in place without aborting the rest of a batch.
				const errorNoteData = {
					uid: panelId,
					title: 'Error Loading Note',
					paramType,
					paramValue
				};
				const panel = createPanel(errorNoteData, loadedPanels.size, true);
				panel.dataset.paramType = paramType;
				panel.dataset.paramValue = paramValue;
				panel.dataset.panelId = panelId;
				container.insertBefore(panel, referenceNode);
				loadedPanels.add(panelId);
				return panel;
			}

			const noteData = resolved.noteData;
			const panel = createPanel(noteData, loadedPanels.size);

			// Store parameter information
			panel.dataset.paramType = paramType;
			panel.dataset.paramValue = paramValue;
			panel.dataset.panelId = panelId;
			// Persist the diff target so updateURL re-emits ;diff= (see
			// collectPanelParams). Only set when a diff was actually rendered, so a
			// degraded/empty diff doesn't pin a broken target into the URL.
			if (params && params.diff && noteData.diffHtml) {
				panel.dataset.diff = params.diff;
			}

			// Apply any per-note parameters carried in the URL (v1: width).
			applyPanelWidth(panel, resolveWidth(params && params.width));

			container.insertBefore(panel, referenceNode);
			loadedPanels.add(panelId);
			return panel;
		}

		// Single-panel entry point (click-to-open, home-note fallback). Resolves then
		// attaches one panel and keeps its historical per-panel tail: scroll to the new
		// panel, refresh link state, push a history entry, and honor a heading anchor.
		// Shares resolvePanelData/attachResolvedPanel with the batch path so there's one
		// source of truth for how a panel is built.
		async function addPanel(paramType, paramValue, afterPanel = null, headingSlug = null, params = null) {
			console.log('addPanel called with:', paramType, paramValue);

			const panelId = panelKey(paramType, paramValue, params);

			// Check if panel is already loaded
			if (loadedPanels.has(panelId)) {
				console.log('Panel already loaded, scrolling to:', panelId);
				const openPanel = scrollToPanel(panelId);
				if (headingSlug && openPanel) scrollToHeading(openPanel, headingSlug);
				return;
			}

			console.log('Creating new panel:', panelId);
			const resolved = await resolvePanelData(paramType, paramValue, params);
			const panel = attachResolvedPanel(resolved, { afterPanel });
			if (!panel) return; // raced to a duplicate between the guard above and attach

			panel.scrollIntoView({ behavior: 'smooth', inline: 'start' });
			updateOpenedNoteLinks();
			updateURL();

			// If a section anchor was requested, scroll to it after the panel's
			// content (and its heading ids) are in the DOM. createPanel set the
			// innerHTML synchronously, so the target exists; defer one frame so the
			// vertical scroll runs after layout settles and doesn't fight the
			// horizontal panel.scrollIntoView above (different scroll containers).
			// (Only meaningful for a successfully loaded note, but harmless otherwise.)
			if (headingSlug && !resolved.error) {
				requestAnimationFrame(() => scrollToHeading(panel, headingSlug));
			}
		}

		// Add this function to handle showing the toast notification
		function showToast(message, duration = 2000) {
			// Remove any existing toast
			const existingToast = document.querySelector('.toast');
			if (existingToast) {
				existingToast.remove();
			}

			// Create and show new toast
			const toast = document.createElement('div');
			toast.className = 'toast';
			toast.textContent = message;
			document.body.appendChild(toast);

			// Trigger reflow and add show class
			toast.offsetHeight;
			toast.classList.add('show');

			// Remove toast after duration
			setTimeout(() => {
				toast.classList.remove('show');
				setTimeout(() => toast.remove(), 200);
			}, duration);
		}



		// Click-and-drag resizing of individual panels.
		// Each panel can be resized by grabbing its right edge. The default
		// starting width (600px, from CSS) is left untouched — we only set an
		// inline width once the user actually drags a given panel, then persist
		// the resolved width into the URL (replaceState) so it's shareable.
		(function setupPanelResizing() {
			const container = document.getElementById('panels');
			const HANDLE_WIDTH = 8;   // width of the grab zone, in px

			let dragPanel = null;     // panel currently being resized
			let startX = 0;           // pointer X at drag start
			let startWidth = 0;       // panel width at drag start
			let hoverPanel = null;    // panel currently showing the hover affordance

			// Find the panel (if any) whose right-edge grab zone contains the
			// pointer. We iterate and measure rather than using e.target, because
			// at a boundary between two panels the pointer sits over the NEXT
			// panel, which would otherwise hide the edge we want to grab.
			//
			// The panel body scrolls directly (overflow-y: auto), so on platforms
			// with classic (non-overlay) scrollbars a vertical scrollbar sits
			// flush against the panel's right edge, inside the grab zone. Shift the
			// zone inward by the scrollbar width (offsetWidth - clientWidth, which
			// is 0 with overlay scrollbars) so the grab zone hugs the content edge
			// and doesn't fight the scrollbar.
			function panelAt(clientX, clientY) {
				const panels = container.querySelectorAll('.panel');
				for (const panel of panels) {
					if (panel.classList.contains('collapsing')) continue;
					const rect = panel.getBoundingClientRect();
					if (clientY < rect.top || clientY > rect.bottom) continue;
					const sbw = panel.offsetWidth - panel.clientWidth; // scrollbar width
					if (clientX >= rect.right - HANDLE_WIDTH - sbw && clientX <= rect.right + 1) {
						return panel;
					}
				}
				return null;
			}

			function setHover(panel) {
				if (hoverPanel === panel) return;
				if (hoverPanel) {
					hoverPanel.classList.remove('resize-hover');
					hoverPanel.style.cursor = '';
				}
				hoverPanel = panel;
				if (hoverPanel) {
					hoverPanel.classList.add('resize-hover');
					hoverPanel.style.cursor = 'col-resize';
				}
			}

			// Hover feedback: show the resize affordance when near a panel's edge.
			container.addEventListener('mousemove', (e) => {
				if (dragPanel) return; // visual state handled during the active drag
				setHover(panelAt(e.clientX, e.clientY));
			});

			container.addEventListener('mouseleave', () => {
				if (!dragPanel) setHover(null);
			});

			container.addEventListener('mousedown', (e) => {
				const panel = panelAt(e.clientX, e.clientY);
				if (!panel) return;

				e.preventDefault(); // avoid starting a text selection
				dragPanel = panel;
				startX = e.clientX;
				startWidth = panel.getBoundingClientRect().width;

				panel.classList.add('resizing');
				document.body.classList.add('panel-resizing');
			});

			document.addEventListener('mousemove', (e) => {
				if (!dragPanel) return;
				let newWidth = startWidth + (e.clientX - startX);
				newWidth = Math.max(PANEL_MIN_WIDTH, Math.min(PANEL_MAX_WIDTH, newWidth));
				// Set both width and flex-basis so the flex layout honors the size.
				dragPanel.style.width = newWidth + 'px';
				dragPanel.style.flexBasis = newWidth + 'px';
			});

			document.addEventListener('mouseup', () => {
				if (!dragPanel) return;
				// Persist the resolved width into the panel dataset and the URL.
				// replaceState (not pushState) so a drag doesn't flood history.
				const finalWidth = Math.round(dragPanel.getBoundingClientRect().width);
				dragPanel.dataset.width = String(finalWidth);
				dragPanel.classList.remove('resizing');
				dragPanel = null;
				document.body.classList.remove('panel-resizing');
				setHover(null);
				updateURL(true);
			});
		})();

		// Initial load based on details in URL
		window.addEventListener('load', () => {
			loadPanelsFromURL();
		});

		// Handle browser back/forward buttons
		window.addEventListener('popstate', () => {
			loadPanelsFromURL();
		});

	// Theme management
	class ThemeManager {
		constructor() {
			this.init();
		}

		init() {
			// Check for saved theme preference or default to 'auto'
			const savedTheme = localStorage.getItem('theme') || 'auto';
			this.setTheme(savedTheme);
			this.setupToggle();
		}

		setTheme(theme) {
			const root = document.documentElement;
			
			// Remove existing theme attribute
			root.removeAttribute('data-theme');
			
			if (theme === 'light') {
				root.setAttribute('data-theme', 'light');
			} else if (theme === 'dark') {
				root.setAttribute('data-theme', 'dark');
			}
			// If theme is 'auto', don't set any attribute, let CSS media query handle it
			
			// Save preference
			localStorage.setItem('theme', theme);
			
			// Update toggle button
			this.updateToggleButton(theme);
		}

		updateToggleButton(theme) {
			const toggle = document.getElementById('theme-toggle');
			const icon = toggle?.querySelector('.theme-icon');
			if (!icon) return;

			switch(theme) {
				case 'light':
					icon.textContent = '☀️';
					toggle.setAttribute('title', 'Switch to dark mode');
					break;
				case 'dark':
					icon.textContent = '🌙';
					toggle.setAttribute('title', 'Switch to auto mode');
					break;
				case 'auto':
				default:
					icon.textContent = '🌓';
					toggle.setAttribute('title', 'Switch to light mode');
					break;
			}
		}

		setupToggle() {
			const toggle = document.getElementById('theme-toggle');
			if (!toggle) return;

			toggle.addEventListener('click', () => {
				const currentTheme = localStorage.getItem('theme') || 'auto';
				let nextTheme;

				// Cycle through: auto -> light -> dark -> auto
				switch(currentTheme) {
					case 'auto':
						nextTheme = 'light';
						break;
					case 'light':
						nextTheme = 'dark';
						break;
					case 'dark':
						nextTheme = 'auto';
						break;
					default:
						nextTheme = 'auto';
				}

				this.setTheme(nextTheme);
			});
		}

		getCurrentTheme() {
			return localStorage.getItem('theme') || 'auto';
		}
	}

	// Initialize theme manager when DOM is loaded
	document.addEventListener('DOMContentLoaded', () => {
		new ThemeManager();
	});

	// ====================================================================
	// LLM chat over the published corpus (Bedrock KB via /api/chat).
	// Streams SSE frames {type:'token'|'citation'|'done'|'error'}. Same-origin
	// fetch rides the HttpOnly session cookie, so auth is inherited at the edge.
	// ====================================================================
	function chatEnabled() {
		return !!cpnConfig().chatEnabled;
	}

	async function initChat() {
		// Config may still be loading; wait so a slow fetch can't make
		// chatEnabled() read false and hide the launcher permanently.
		if (window.__CPN_CONFIG_READY__) { try { await window.__CPN_CONFIG_READY__; } catch (e) {} }
		if (!chatEnabled()) return;

		const launcher = document.getElementById('cpn-chat-launcher');
		const panel = document.getElementById('cpn-chat-panel');
		const header = document.getElementById('cpn-chat-header');
		const collapseBtn = document.getElementById('cpn-chat-collapse');
		const log = document.getElementById('cpn-chat-log');
		const form = document.getElementById('cpn-chat-form');
		const input = document.getElementById('cpn-chat-input');
		const sendBtn = document.getElementById('cpn-chat-send');
		const resizeHandle = document.getElementById('cpn-chat-resize');
		if (!launcher || !panel) return;

		launcher.hidden = false;
		let conversationId;
		let expandedHeight = ''; // drag-set inline height, stashed across collapse

		// Warm the content index so the first answer's citations can resolve UIDs to
		// titles without an extra round-trip mid-render (memoized; no-op if disabled).
		loadNoteIndexOnce();

		const open = () => { panel.hidden = false; launcher.hidden = true; input.focus(); };
		launcher.addEventListener('click', open);

		// Collapse toggle (replaces the old close). Collapsing shrinks the panel to
		// its header bar and hides the log + form via a class, so messages,
		// conversationId, and any in-progress input survive. There is no full close:
		// the launcher is only the first-run entry point and never returns once open.
		const setCollapsed = (on) => {
			// A drag sets an inline height, which would override the collapsed
			// rule's `height: auto` (inline beats the stylesheet) and leave the box
			// at full height with its body hidden. Stash + clear it on collapse and
			// restore it on expand. Width is untouched by collapse, so it needs no
			// handling.
			if (on) {
				expandedHeight = panel.style.height;
				panel.style.height = '';
			} else if (expandedHeight) {
				panel.style.height = expandedHeight;
			}
			panel.classList.toggle('cpn-chat-collapsed', on);
			collapseBtn.textContent = on ? '⌃' : '⌄';
			collapseBtn.setAttribute('aria-expanded', String(!on));
			collapseBtn.setAttribute('aria-label', on ? 'Expand chat' : 'Collapse chat');
			if (!on) input.focus();
		};
		collapseBtn.addEventListener('click', (e) => {
			e.stopPropagation(); // don't also fire the header's expand handler
			setCollapsed(!panel.classList.contains('cpn-chat-collapsed'));
		});
		// Clicking the slim bar itself expands (no-op when already expanded).
		header.addEventListener('click', () => {
			if (panel.classList.contains('cpn-chat-collapsed')) setCollapsed(false);
		});

		// Click-and-drag resize via the top-left corner grip. Mirrors the note-panel
		// resizer (setupPanelResizing), but the chat box is anchored bottom-right, so
		// dragging the corner up/left must GROW the box — hence the subtracted deltas
		// (the note-panel right-edge handler adds them). The panel is position:fixed
		// (not a flex item), so we set width + height directly. Size is session-only:
		// nothing is persisted, so a reload restores the CSS default.
		const CHAT_MIN_W = 320, CHAT_MIN_H = 300;
		let rzX = 0, rzY = 0, rzW = 0, rzH = 0, resizing = false;
		if (resizeHandle) {
			resizeHandle.addEventListener('mousedown', (e) => {
				e.preventDefault();   // don't start a text selection
				e.stopPropagation();  // don't trigger the header's expand handler
				const rect = panel.getBoundingClientRect();
				resizing = true;
				rzX = e.clientX; rzY = e.clientY;
				rzW = rect.width; rzH = rect.height;
				document.body.classList.add('cpn-chat-resizing');
			});
			document.addEventListener('mousemove', (e) => {
				if (!resizing) return;
				const maxW = window.innerWidth - 40, maxH = window.innerHeight - 40;
				const w = Math.max(CHAT_MIN_W, Math.min(maxW, rzW - (e.clientX - rzX)));
				const h = Math.max(CHAT_MIN_H, Math.min(maxH, rzH - (e.clientY - rzY)));
				panel.style.width = w + 'px';
				panel.style.height = h + 'px';
			});
			document.addEventListener('mouseup', () => {
				if (!resizing) return;
				resizing = false;
				document.body.classList.remove('cpn-chat-resizing');
			});
		}

		function addMessage(role, text) {
			const el = document.createElement('div');
			el.className = 'cpn-chat-msg ' + role;
			el.textContent = text;
			log.appendChild(el);
			log.scrollTop = log.scrollHeight;
			return el;
		}

		async function renderCitations(el, uids) {
			if (!uids.length) return;
			// Resolve UIDs to human titles via the shared content index (memoized
			// single fetch of /static/content/contentIndex.json). When the index is
			// disabled or a uid isn't in it, noteTitleMap.get returns undefined and we
			// fall back to the raw uid so the citation still renders and links.
			await loadNoteIndexOnce();
			const wrap = document.createElement('div');
			wrap.className = 'cpn-chat-citations';
			wrap.appendChild(document.createTextNode('Sources: '));
			uids.forEach((uid) => {
				const a = document.createElement('a');
				// Keep a real href so copy-link / middle-click / open-in-new-tab work,
				// but intercept the click to open the note as a stacked panel in-app —
				// the same path every other internal note link uses (addPanel dedupes,
				// scrolls to an already-open panel, and updates the URL). The chat panel
				// lives outside #panels, so the per-panel link delegation never sees
				// these anchors; wire the handler directly.
				a.href = '#/u' + encodeURIComponent(uid);
				a.textContent = noteTitleMap.get(uid) || uid;
				a.addEventListener('click', (e) => {
					e.preventDefault();
					addPanel('u', uid);
				});
				wrap.appendChild(a);
			});
			el.appendChild(wrap);
			log.scrollTop = log.scrollHeight;
		}

		async function ask(question) {
			addMessage('user', question);
			const answerEl = addMessage('assistant', '');
			let answerText = '';
			const citedUids = [];
			sendBtn.disabled = true;
			input.disabled = true;
			try {
				const payload = JSON.stringify(conversationId ? { question, conversationId } : { question });
				// The chat origin is a Lambda Function URL locked to CloudFront via a
				// lambda OAC. For POST bodies, Lambda requires the payload hash in
				// x-amz-content-sha256 so CloudFront's SigV4 signature covers the body
				// (Lambda rejects unsigned payloads). Compute hex(SHA-256(body)).
				const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(payload));
				const payloadHash = Array.from(new Uint8Array(digest), (b) => b.toString(16).padStart(2, '0')).join('');
				const resp = await fetch(cpnConfig().chatPath || '/api/chat', {
					method: 'POST',
					credentials: 'same-origin',
					headers: { 'content-type': 'application/json', 'x-amz-content-sha256': payloadHash },
					body: payload,
				});
				if (!resp.ok || !resp.body) {
					answerEl.textContent = 'Sorry, the chat request failed (' + resp.status + ').';
					return;
				}
				const reader = resp.body.getReader();
				const decoder = new TextDecoder();
				let buffer = '';
				for (;;) {
					const { value, done } = await reader.read();
					if (done) break;
					buffer += decoder.decode(value, { stream: true });
					// SSE frames are separated by a blank line.
					let idx;
					while ((idx = buffer.indexOf('\n\n')) !== -1) {
						const frame = buffer.slice(0, idx);
						buffer = buffer.slice(idx + 2);
						const line = frame.split('\n').find((l) => l.startsWith('data:'));
						if (!line) continue;
						let evt;
						try { evt = JSON.parse(line.slice(5).trim()); } catch (e) { continue; }
						if (evt.type === 'token') {
							answerText += evt.text;
							answerEl.textContent = answerText;
							log.scrollTop = log.scrollHeight;
						} else if (evt.type === 'citation') {
							if (citedUids.indexOf(evt.uid) === -1) citedUids.push(evt.uid);
						} else if (evt.type === 'done') {
							if (evt.conversationId) conversationId = evt.conversationId;
						} else if (evt.type === 'error') {
							answerText += (answerText ? '\n\n' : '') + '[error: ' + evt.error + ']';
							answerEl.textContent = answerText;
						}
					}
				}
				if (!answerText) answerEl.textContent = '(no answer returned)';
				await renderCitations(answerEl, citedUids);
			} catch (e) {
				answerEl.textContent = 'Sorry, the chat request failed.';
			} finally {
				sendBtn.disabled = false;
				input.disabled = false;
				input.focus();
			}
		}

		form.addEventListener('submit', (e) => {
			e.preventDefault();
			const q = input.value.trim();
			if (!q) return;
			input.value = '';
			ask(q);
		});
		// Enter to send, Shift+Enter for newline.
		input.addEventListener('keydown', (e) => {
			if (e.key === 'Enter' && !e.shiftKey) {
				e.preventDefault();
				form.requestSubmit();
			}
		});
	}

	document.addEventListener('DOMContentLoaded', () => { initChat(); });
	</script>
</body>
</html>
